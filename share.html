<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keepsake — A letter for you</title>
  <style>
    /* ── Palette (matches extension) ── */
    :root {
      --butter:    #F2D88F;
      --blush:     #E36888;
      --tangerine: #F08C21;
      --sea:       #6698CC;
      --cream:     #FFFBF4;
      --ink:       #3a2418;
      --ink-mid:   #8a5a48;
      --ink-lt:    #c4977a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--butter) url('background.png') center / cover no-repeat fixed;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 16px 72px;
    }

    /* ── Layout ── */
    .page { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    /* ── Header card ── */
    .header-card {
      background: url('faq-bg-pink.png') top / cover no-repeat;
      border-radius: 14px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }
    .header-card::before {
      content: '♪';
      position: absolute;
      right: 18px;
      top: 14px;
      font-size: 64px;
      color: rgba(92,45,45,0.10);
      line-height: 1;
      pointer-events: none;
    }
    .eyebrow {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(92,45,45,0.55);
      margin-bottom: 8px;
    }
    .sender-name {
      font-size: 30px;
      font-weight: 800;
      color: #5c2d2d;
      line-height: 1.15;
    }
    .recipient-line {
      font-size: 13px;
      color: rgba(92,45,45,0.72);
      margin-top: 4px;
    }
    .recipient-line strong { color: #5c2d2d; font-weight: 700; }
    .sender-sub {
      font-size: 13px;
      color: rgba(92,45,45,0.72);
      margin-top: 6px;
    }
    .denomination {
      margin-top: 18px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(92,45,45,0.35);
      text-align: right;
    }

    /* ── Section divider ── */
    .song-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--ink-mid);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.65;
    }
    .song-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(58,36,24,0.18);
    }

    /* ── Song group ── */
    .song-group { display: flex; flex-direction: column; gap: 10px; }

    .song-title-block {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .song-title-block strong { font-size: 14px; font-weight: 700; color: var(--ink); }
    .song-title-block span  { font-size: 12px; color: var(--ink-mid); }

    /* ── Notes grid ── */
    .notes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: start;
    }

    .note-card {
      background: var(--cream);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .note-ts {
      font-size: 9px;
      font-weight: 700;
      color: var(--tangerine);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .note-redacted {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .note-redacted span {
      display: block;
      height: 8px;
      background: rgba(58,36,24,0.1);
      border-radius: 4px;
    }
    .note-redacted span:last-child {
      width: 60%;
    }

    /* ── Spotify button ── */
    .spotify-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 8px 0 4px;
    }
    .btn-spotify {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1DB954;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(29,185,84,0.28);
      transition: opacity 0.15s, transform 0.12s;
    }
    .btn-spotify:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-spotify svg { flex-shrink: 0; }
    .spotify-note {
      font-size: 11px;
      color: var(--ink-mid);
      text-align: center;
      line-height: 1.6;
      opacity: 0.75;
    }

    /* ── Import into extension (installed) ── */
    .import-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-height: 52px; /* prevents layout jump during detection */
    }
    .btn-import {
      background: var(--tangerine);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 13px 26px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 5px 18px rgba(240,140,33,0.28);
      transition: opacity 0.15s, transform 0.12s;
    }
    .btn-import:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-import:disabled { opacity: 0.45; cursor: default; transform: none; }
    .import-note {
      font-size: 11px;
      color: var(--ink-mid);
      text-align: center;
      line-height: 1.6;
      opacity: 0.75;
      margin: 0;
    }

    /* ── Install nudge (not installed) ── */
    .install-nudge {
      background: var(--cream);
      border-radius: 14px;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      width: 100%;
    }
    .install-nudge-eyebrow {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--ink-mid);
      font-weight: 700;
      opacity: 0.65;
    }
    .install-nudge-body {
      font-size: 13px;
      color: var(--ink);
      line-height: 1.55;
      max-width: 340px;
    }
    .btn-install {
      display: inline-block;
      background: var(--tangerine);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 13px 26px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-decoration: none;
      box-shadow: 0 5px 18px rgba(240,140,33,0.28);
      transition: opacity 0.15s, transform 0.12s;
      margin-top: 2px;
    }
    .btn-install:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Nav ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; max-width: 560px; margin: 0 auto;
    }
    .nav-logo {
      font-family: Georgia, serif;
      font-style: italic; font-size: 20px;
      color: var(--ink); text-decoration: none; opacity: 0.75;
      display: flex; align-items: center; gap: 4px;
    }
    .nav-logo span { font-style: normal; font-size: 11px; color: var(--tangerine); }
    .nav-get {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--blush);
      text-decoration: none; opacity: 0.8; transition: opacity 0.15s;
    }
    .nav-get:hover { opacity: 1; }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-mid);
      font-size: 14px;
      line-height: 1.6;
    }
    .state strong { color: var(--ink); display: block; font-size: 20px; margin-bottom: 8px; }
    .state.loading { color: var(--blush); font-family: 'Lora', Georgia, serif; font-style: italic; font-size: 16px; }
    .loading-dot {
      display: inline-block;
      animation: ks-pulse 1.6s ease-in-out infinite;
    }
    @keyframes ks-pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.85); }
    }

    .imported-banner {
      background: rgba(240,140,33,0.12);
      border: 1.5px solid rgba(240,140,33,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      color: var(--tangerine);
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">keepsake.<span>✦</span></a>
  <a class="nav-get" href="auth.html">Get Keepsake →</a>
</nav>
<div class="page" id="page">
  <div class="state" id="loading">
    <strong>Opening your letter…</strong>
    Fetching notes from the cloud
  </div>
</div>

<script>
  // ── Config (keep in sync with config.js) ──────────────────
  const SUPABASE_URL = "https://kkasgbkgwjxiutdalbbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYXNnYmtnd2p4aXV0ZGFsYmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjU3OTQsImV4cCI6MjA5Mjg0MTc5NH0.z1JLMTzz3X_swbWHdt2z4UDKyUwjEfNYys5kdDMq3R4";
  // ── Chrome Web Store link — update this one line when published ──
  const EXTENSION_CWS_URL = null; // e.g. "https://chromewebstore.google.com/detail/keepsake/EXTENSION_ID"

  // ── Helpers ───────────────────────────────────────────────
  function getShareId() {
    const params = new URLSearchParams(window.location.search);
    if (params.get("id")) return params.get("id");
    const m = window.location.pathname.match(/\/share\/([a-z0-9_-]+)/i);
    return m ? m[1] : null;
  }

  function formatTs(sec) {
    if (sec == null) return "Song start";
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }

  // Fetches JSON with a hard timeout. Throws on network failure or timeout
  // so callers can show a proper error instead of hanging forever.
  async function fetchJson(url, timeoutMs = 9000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!res.ok) return null;
      return res.json();
    } catch (err) {
      clearTimeout(timer);
      if (err.name === "AbortError") throw new Error("timeout");
      throw err; // re-throw network errors so the outer catch can handle them
    }
  }

  // ── End-to-end decryption ────────────────────────────────────
  // The encryption key lives only in the URL fragment (#k=...).
  // Fragments are never sent to any server — only the browser and
  // JavaScript running locally can read them.

  async function importEncKey(b64) {
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    return crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, false, ["decrypt"]);
  }
  function looksEncrypted(s) {
    return s && s.length > 30 && !/\s/.test(s) && /^[A-Za-z0-9+\/=]+$/.test(s);
  }
  async function decryptField(b64, key) {
    if (b64 == null) return null;
    try {
      const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const dec = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: buf.slice(0, 12) },
        key,
        buf.slice(12)
      );
      return new TextDecoder().decode(dec);
    } catch {
      return b64; // old plaintext share — return value as-is
    }
  }
  async function decryptNoteFields(note, key) {
    return {
      ...note,
      note:         await decryptField(note.note, key),
      track_title:  await decryptField(note.track_title, key),
      track_artist: await decryptField(note.track_artist, key),
      sender_name:  await decryptField(note.sender_name, key),
    };
  }

  // ── Spotify link logic ─────────────────────────────────────
  function isLocalTrack(trackId) {
    // Local files have IDs like "local:Coffee::BTS" — no real Spotify URL exists
    return !trackId || trackId.startsWith("local:");
  }

  function spotifyLink(meta, notes) {
    // Playlist link takes priority (sender explicitly set it)
    if (meta?.playlist_url) return meta.playlist_url;
    if (meta?.playlist_id) return `https://open.spotify.com/playlist/${meta.playlist_id}`;
    // Single song
    const firstNote = notes[0];
    const trackId = firstNote?.track_id;
    if (isLocalTrack(trackId)) {
      // Local file — fall back to search by title + artist
      const q = [firstNote?.track_title, firstNote?.track_artist].filter(Boolean).join(" ");
      return q ? `https://open.spotify.com/search/${encodeURIComponent(q)}` : null;
    }
    return `https://open.spotify.com/track/${trackId}`;
  }

  function spotifyLabel(meta, notes) {
    if (meta?.playlist_url || meta?.playlist_id) return "Open playlist in Spotify";
    const trackId = notes[0]?.track_id;
    if (isLocalTrack(trackId)) return "Search song on Spotify";
    return "Open song in Spotify";
  }

  // ── Render ────────────────────────────────────────────────
  function render(shareId, meta, notes) {
    const page = document.getElementById("page");
    const sender = meta?.sender_name || notes[0]?.sender_name || "someone";

    // Group notes by track
    const byTrack = {};
    notes.forEach(n => {
      const key = n.track_id;
      if (!byTrack[key]) byTrack[key] = { title: n.track_title, artist: n.track_artist, trackId: n.track_id, notes: [] };
      byTrack[key].notes.push(n);
    });
    Object.values(byTrack).forEach(g =>
      g.notes.sort((a, b) => (a.timestamp ?? -1) - (b.timestamp ?? -1))
    );

    const trackCount = Object.keys(byTrack).length;
    const recipient = meta?.recipient_name || null;

    let html = `
      <div class="header-card">
        <div class="eyebrow">✉ a letter from</div>
        <div class="sender-name">${escHtml(sender)}</div>
        ${recipient ? `<div class="recipient-line">for <strong>${escHtml(recipient)}</strong></div>` : ""}
        <div class="sender-sub">chose ${notes.length} moment${notes.length === 1 ? "" : "s"} across ${trackCount} song${trackCount === 1 ? "" : "s"} just for you</div>
        <div class="denomination">Keepsake</div>
      </div>
    `;

    Object.values(byTrack).forEach(group => {
      html += `<div class="song-group">`;
      html += `<div class="song-label">Song</div>`;
      html += `<div class="song-title-block">
        <strong>${escHtml(group.title || "Unknown track")}</strong>
        <span>${escHtml(group.artist || "")}</span>
      </div>`;
      html += `<div class="notes-grid">`;
      group.notes.forEach(n => {
        html += `
          <div class="note-card">
            <div class="note-ts">${escHtml(formatTs(n.timestamp))}</div>
            <div class="note-redacted">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        `;
      });
      html += `</div></div>`;
    });

    // Spotify open button
    const spLink = spotifyLink(meta, notes);
    if (spLink) {
      html += `
        <div class="spotify-area">
          <a class="btn-spotify" href="${escHtml(spLink)}" target="_blank" rel="noopener">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 0 1-.857.208c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 1 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 0 1 .207.856zm1.223-2.723a.78.78 0 0 1-1.072.257C14.1 12.307 10.64 11.75 7.4 12.66a.781.781 0 0 1-.356-1.52c3.648-1.054 7.494-.468 10.488 1.488a.78.78 0 0 1 .277 1.073zm.105-2.835c-3.023-1.796-8.01-1.96-10.898-1.086a.936.936 0 1 1-.543-1.79c3.317-1.007 8.831-.812 12.315 1.256a.935.935 0 1 1-.874 1.62z"/>
            </svg>
            ${spotifyLabel(meta, notes)}
          </a>
        </div>
      `;
    }

    // Spotify attribution — required by Spotify Developer Policy Section II.4
    html += `<p class="spotify-note">Music data from <a href="https://spotify.com" target="_blank" rel="noopener" style="color:inherit">Spotify</a></p>`;

    // Import section — filled in after extension detection below
    html += `<div id="importArea" class="import-area"></div>`;

    page.innerHTML = html;

    // Set payload so share-bridge.js can pick it up when it loads
    window.__KS_PAYLOAD = { share_id: shareId, share: meta || {}, notes };

    // ── Extension detection ───────────────────────────────────
    // share-bridge.js sets data-keepsake-installed and fires "keepsake:ready"
    // at document_idle. We give it up to 1 s to appear; if it doesn't, the
    // extension isn't installed.
    let detected = false;

    function onExtensionReady() {
      if (detected) return;
      detected = true;
      renderImportInstalled(shareId, meta, notes);
      // Bridge may have already picked up __KS_PAYLOAD; fire once more to be safe
      window.dispatchEvent(new CustomEvent("keepsake:import", { detail: window.__KS_PAYLOAD }));
    }

    function onDetectionTimeout() {
      if (detected) return;
      detected = true;
      renderImportNotInstalled();
    }

    window.addEventListener("keepsake:ready", onExtensionReady, { once: true });
    // Fallback: check the attribute directly (bridge may have already run)
    if (document.documentElement.getAttribute("data-keepsake-installed") === "1") {
      onExtensionReady();
    } else {
      setTimeout(onDetectionTimeout, 1000);
    }
  }

  // ── Import UI: extension installed ───────────────────────
  function renderImportInstalled(shareId, meta, notes) {
    const area = document.getElementById("importArea");
    if (!area) return;
    area.innerHTML = `
      <button class="btn-import" id="importBtn">♫ Import into Keepsake</button>
      <p class="import-note">Notes will pop up as you listen in Spotify.</p>
    `;
    document.getElementById("importBtn").addEventListener("click", () => {
      window.__KS_PAYLOAD = { share_id: shareId, share: meta || {}, notes };
      window.dispatchEvent(new CustomEvent("keepsake:import", { detail: window.__KS_PAYLOAD }));
      window.addEventListener("keepsake:imported", () => {
        const btn = document.getElementById("importBtn");
        const note = area.querySelector(".import-note");
        if (btn) btn.disabled = true;
        if (note) note.innerHTML = `<span style="color:var(--tangerine);font-weight:600">✓ Imported! Open Spotify and hit play.</span>`;
      }, { once: true });
    });
  }

  // ── Import UI: extension not installed ───────────────────
  function renderImportNotInstalled() {
    const area = document.getElementById("importArea");
    if (!area) return;
    const cwsHref = EXTENSION_CWS_URL || "#";
    const isPublished = !!EXTENSION_CWS_URL;
    area.innerHTML = `
      <div class="install-nudge">
        <div class="install-nudge-eyebrow">Want to hear it their way?</div>
        <div class="install-nudge-body">
          Keepsake pops up their notes as you listen — right on the Spotify page.
        </div>
        <a class="btn-install" href="${cwsHref}" target="_blank" rel="noopener"
          ${!isPublished ? 'aria-disabled="true" style="opacity:0.5;cursor:default;pointer-events:none"' : ""}>
          Add Keepsake to Chrome — it's free
        </a>
        ${!isPublished ? `<p class="import-note" style="color:var(--blush);opacity:1">Not yet published — coming soon.</p>` : ""}
      </div>
    `;
  }

  // ── Main ──────────────────────────────────────────────────
  (async () => {
    const shareId = getShareId();
    const page = document.getElementById("page");

    if (!shareId) {
      page.innerHTML = `<div class="state"><strong>No letter here</strong>You need a share link to open a letter.</div>`;
      return;
    }

    // Show immediately — recipient sees something the moment the page loads,
    // not a blank screen while waiting for Supabase.
    page.innerHTML = `<div class="state loading"><span class="loading-dot">✦</span> opening your letter…</div>`;

    // Extract encryption key from URL fragment — never sent to any server.
    const fragment = new URLSearchParams(window.location.hash.slice(1));
    const keyB64 = fragment.get("k");

    // e=1 is added by the sender to mark this as an encrypted link.
    // If it's present but the key is missing from the fragment, the most
    // likely cause is a messaging app or email client stripping the #… part.
    const isEncrypted = new URLSearchParams(window.location.search).get("e") === "1";
    if (isEncrypted && !keyB64) {
      page.innerHTML = `<div class="state"><strong>Part of your link got cut off</strong>Ask the sender to resend it, or try opening it in a different browser.</div>`;
      return;
    }

    let encKey = null;
    if (keyB64) {
      try {
        encKey = await importEncKey(keyB64);
      } catch {
        page.innerHTML = `<div class="state"><strong>Invalid link</strong>This share link appears to be corrupted or incomplete.</div>`;
        return;
      }
    }

    try {
      const [rawMeta, rawNotes] = await Promise.all([
        fetchJson(`${SUPABASE_URL}/rest/v1/shares?id=eq.${encodeURIComponent(shareId)}&select=*`)
          .then(r => (Array.isArray(r) ? r[0] : null)),
        fetchJson(`${SUPABASE_URL}/rest/v1/annotations?share_id=eq.${encodeURIComponent(shareId)}&select=*`)
          .then(r => Array.isArray(r) ? r : []),
      ]);

      if (!rawNotes.length && !rawMeta) {
        page.innerHTML = `<div class="state"><strong>Letter not found</strong>This link may be invalid or the notes were removed.</div>`;
        return;
      }

      // Decrypt locally — ciphertext never leaves this device in plaintext form
      const notes = encKey
        ? await Promise.all(rawNotes.map(n => decryptNoteFields(n, encKey)))
        : rawNotes;
      const meta = (encKey && rawMeta) ? {
        ...rawMeta,
        sender_name:    await decryptField(rawMeta.sender_name, encKey),
        recipient_name: rawMeta.recipient_name
          ? (looksEncrypted(rawMeta.recipient_name)
              ? await decryptField(rawMeta.recipient_name, encKey)
              : rawMeta.recipient_name)
          : null,
      } : rawMeta;

      document.title = `Keepsake — a letter from ${meta?.sender_name || "someone"}`;
      render(shareId, meta, notes);

    } catch (err) {
      const isTimeout = err.message === "timeout";
      page.innerHTML = `
        <div class="state">
          <strong>${isTimeout ? "Still loading…" : "Couldn't load your letter"}</strong>
          ${isTimeout
            ? "This is taking longer than usual. Check your connection and try again."
            : "Something went wrong. Check your connection and try again."}
          <a href="" style="display:block;margin-top:14px;color:var(--blush);font-weight:600;font-size:13px;">Try again</a>
        </div>`;
    }
  })();
</script>
</body>
</html>
