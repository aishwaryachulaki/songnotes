<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keepsake — A letter for you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@500;600;700&display=swap" />
  <style>
    :root {
      --butter:    #F2D88F;
      --blush:     #E36888;
      --tangerine: #F08C21;
      --cream:     #FFFBF4;
      --ink:       #3a2418;
      --ink-mid:   #8a5a48;
      --olive:     #3b3a27;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      background: var(--cream) url('background.png') center / cover no-repeat fixed;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    /* ── Hero: full viewport, no scroll ── */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 24px;
      flex-shrink: 0;
    }
    .nav-logo {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-size: 21px;
      color: #c0544e;
      text-decoration: none;
    }
    .nav-logo .logo-spark { font-style: normal; color: var(--tangerine); }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .nav-link:hover { opacity: 1; }
    .nav-link--pill {
      background: rgba(227, 104, 136, 0.07);
      border: 1.5px solid rgba(227, 104, 136, 0.40);
      border-radius: 50px;
      padding: 5px 12px;
      color: var(--blush);
      opacity: 1;
    }
    .nav-link--pill:hover {
      background: rgba(227, 104, 136, 0.18);
      border-color: rgba(227, 104, 136, 0.65);
      opacity: 1;
    }

    /* ── Hero content (centered middle) ── */
    .hero-content {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
      margin-top: clamp(-60px, -4vh, -20px);
    }
    .hero-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      opacity: 0.6;
      margin-bottom: clamp(6px, 1.2vh, 14px);
    }
    .hero-title {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(26px, 4vw, 52px);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.15;
      max-width: 520px;
      margin-bottom: clamp(6px, 1vh, 12px);
    }
    .hero-artist {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(13px, 1.4vw, 16px);
      color: var(--blush);
      margin-bottom: clamp(8px, 1.4vh, 16px);
    }
    .hero-artist strong { font-weight: 700; }
    .hero-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(280px, 60vw);
      margin-bottom: clamp(6px, 1.2vh, 12px);
      color: var(--tangerine);
      font-size: 12px;
    }
    .hero-divider::before,
    .hero-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(58, 36, 24, 0.18);
    }
    .hero-count {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: clamp(12px, 1.2vw, 14px);
      color: var(--ink-mid);
      margin-bottom: clamp(2px, 0.5vh, 6px);
    }
    .hero-recipient {
      font-size: clamp(11px, 1.1vw, 13px);
      color: var(--ink-mid);
      opacity: 0.75;
      margin-bottom: 0;
    }
    .hero-recipient strong { color: var(--ink); font-weight: 700; }

    /* ── Action buttons ── */
    .hero-actions {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: clamp(14px, 2.5vh, 28px);
    }
    /* shared pale-pink pill — same values as .prev-activate in popup.css */
    .hero-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(227, 104, 136, 0.07);
      border: 1.5px solid rgba(227, 104, 136, 0.40);
      color: var(--blush);
      border-radius: 50px;
      padding: 9px 22px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .hero-btn:hover {
      background: rgba(227, 104, 136, 0.18);
      border-color: rgba(227, 104, 136, 0.65);
    }
    .hero-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Envelope — shows top ~55%, cropped at bottom edge ── */
    .hero-envelope {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      flex-shrink: 0;
      height: clamp(160px, 35vh, 400px);
      overflow: hidden;
      margin-top: -40px;
    }
    .envelope-img {
      width: min(720px, 88vw);
      display: block;
      filter: drop-shadow(0 -6px 24px rgba(58,36,24,0.10));
    }

    /* ── Discover link ── */
    .discover-link {
      display: block;
      margin-top: 16px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-mid);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .discover-link:hover { opacity: 1; }

    /* ── Loading / error states ── */
    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-mid);
      font-size: 14px;
      line-height: 1.6;
    }
    .state strong { color: var(--ink); display: block; font-size: 20px; margin-bottom: 8px; }
    .state.loading { color: var(--blush); font-family: 'Lora', Georgia, serif; font-style: italic; font-size: 16px; }
    .loading-dot {
      display: inline-block;
      animation: ks-pulse 1.6s ease-in-out infinite;
    }
    @keyframes ks-pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.85); }
    }
  </style>
</head>
<body>

<div class="hero" id="heroSection">
  <nav class="nav">
    <a class="nav-logo" href="index.html">keepsake.<span class="logo-spark">✦</span></a>
    <div class="nav-links">
      <a href="notes.html" class="nav-link">Notes</a>
      <a href="account.html" class="nav-link">Account</a>
      <a href="auth.html" class="nav-link nav-link--pill">Sign out</a>
    </div>
  </nav>
  <div id="heroContent" class="hero-content">
    <div class="state loading"><span class="loading-dot">✦</span> opening your letter…</div>
  </div>
  <div class="hero-envelope">
    <img src="share-envelope.png" alt="" class="envelope-img" />
  </div>
</div>

<script>
  const SUPABASE_URL = "https://kkasgbkgwjxiutdalbbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYXNnYmtnd2p4aXV0ZGFsYmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjU3OTQsImV4cCI6MjA5Mjg0MTc5NH0.z1JLMTzz3X_swbWHdt2z4UDKyUwjEfNYys5kdDMq3R4";
  // TODO: replace with real Chrome Web Store URL once the extension is published.
  // e.g. "https://chromewebstore.google.com/detail/keepsake/YOUR_EXTENSION_ID"
  const EXTENSION_CWS_URL = "index.html";

  function getShareId() {
    const params = new URLSearchParams(window.location.search);
    if (params.get("id")) return params.get("id");
    const m = window.location.pathname.match(/\/share\/([a-z0-9_-]+)/i);
    return m ? m[1] : null;
  }

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }

  async function fetchJson(url, timeoutMs = 9000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!res.ok) return null;
      return res.json();
    } catch (err) {
      clearTimeout(timer);
      if (err.name === "AbortError") throw new Error("timeout");
      throw err;
    }
  }

  async function importEncKey(b64) {
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    return crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, false, ["decrypt"]);
  }
  function looksEncrypted(s) {
    return s && s.length > 30 && !/\s/.test(s) && /^[A-Za-z0-9+\/=]+$/.test(s);
  }
  async function decryptField(b64, key) {
    if (b64 == null) return null;
    try {
      const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const dec = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: buf.slice(0, 12) },
        key,
        buf.slice(12)
      );
      return new TextDecoder().decode(dec);
    } catch { return b64; }
  }
  async function decryptNoteFields(note, key) {
    return {
      ...note,
      note:         await decryptField(note.note, key),
      track_title:  await decryptField(note.track_title, key),
      track_artist: await decryptField(note.track_artist, key),
      sender_name:  await decryptField(note.sender_name, key),
    };
  }

  function isLocalTrack(trackId) {
    return !trackId || trackId.startsWith("local:");
  }
  function spotifyLink(meta, notes) {
    if (meta?.playlist_url) return meta.playlist_url;
    if (meta?.playlist_id) return `https://open.spotify.com/playlist/${meta.playlist_id}`;
    const firstNote = notes[0];
    const trackId = firstNote?.track_id;
    if (isLocalTrack(trackId)) {
      const q = [firstNote?.track_title, firstNote?.track_artist].filter(Boolean).join(" ");
      return q ? `https://open.spotify.com/search/${encodeURIComponent(q)}` : null;
    }
    return `https://open.spotify.com/track/${trackId}`;
  }
  function spotifyLabel(meta, notes) {
    if (meta?.playlist_url || meta?.playlist_id) return "Open playlist in Spotify";
    const trackId = notes[0]?.track_id;
    if (isLocalTrack(trackId)) return "Search on Spotify";
    return "Open in Spotify";
  }

  function showHeroError(html) {
    document.getElementById("heroContent").innerHTML = `<div class="state">${html}</div>`;
  }

  function render(shareId, meta, notes) {
    const sender = meta?.sender_name || notes[0]?.sender_name || "someone";

    const byTrack = {};
    notes.forEach(n => {
      if (!byTrack[n.track_id]) byTrack[n.track_id] = { title: n.track_title, artist: n.track_artist };
    });
    const trackCount = Object.keys(byTrack).length;
    const recipient = meta?.recipient_name || null;
    const totalNotes = notes.length;

    const isPlaylist = trackCount > 1 || !!(meta?.playlist_name);
    const heroTitle = isPlaylist
      ? (meta?.playlist_name || "A Playlist Share")
      : (notes[0]?.track_title || "A song");
    const heroArtist = isPlaylist ? sender : (notes[0]?.track_artist || "");

    const spLink = spotifyLink(meta, notes);

    const heroEl = document.getElementById("heroContent");
    heroEl.innerHTML = `
      <div class="hero-eyebrow">You've received</div>
      <h1 class="hero-title">${escHtml(heroTitle)}</h1>
      ${heroArtist ? `<div class="hero-artist">by <strong>${escHtml(heroArtist)}</strong></div>` : ""}
      <div class="hero-divider">✦</div>
      <div class="hero-count">${totalNotes} note${totalNotes === 1 ? "" : "s"} inside</div>
      ${recipient ? `<div class="hero-recipient">for <strong>${escHtml(recipient)}</strong></div>` : ""}
      <div class="hero-actions" id="heroActions"></div>
      <a href="index.html" class="discover-link">New to Keepsake? Find out more →</a>
    `;

    window.__KS_PAYLOAD = { share_id: shareId, share: meta || {}, notes };

    let detected = false;

    function onExtensionReady() {
      if (detected) return;
      detected = true;
      const actions = document.getElementById("heroActions");
      if (!actions) return;

      // Import button
      const btn = document.createElement("button");
      btn.className = "hero-btn";
      btn.id = "importBtn";
      btn.textContent = "✧ Import into Keepsake";
      actions.appendChild(btn);
      btn.addEventListener("click", () => {
        window.__KS_PAYLOAD = { share_id: shareId, share: meta || {}, notes };
        window.dispatchEvent(new CustomEvent("keepsake:import", { detail: window.__KS_PAYLOAD }));
        window.addEventListener("keepsake:imported", () => {
          btn.disabled = true;
          btn.textContent = "✧ Imported!";
        }, { once: true });
      });

      // Spotify button — only shown once extension is confirmed
      if (spLink) {
        const a = document.createElement("a");
        a.className = "hero-btn";
        a.href = spLink;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = `✧ ${spotifyLabel(meta, notes)}`;
        actions.appendChild(a);
      }

      window.dispatchEvent(new CustomEvent("keepsake:import", { detail: window.__KS_PAYLOAD }));
    }

    function onDetectionTimeout() {
      if (detected) return;
      detected = true;
      // Extension not installed — only show the install prompt, no Spotify access
      if (!EXTENSION_CWS_URL) return;
      const actions = document.getElementById("heroActions");
      if (!actions) return;
      const a = document.createElement("a");
      a.className = "hero-btn";
      a.href = EXTENSION_CWS_URL;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = "✧ Get Keepsake — it's free";
      actions.appendChild(a);
    }

    window.addEventListener("keepsake:ready", onExtensionReady, { once: true });
    if (document.documentElement.getAttribute("data-keepsake-installed") === "1") {
      onExtensionReady();
    } else {
      setTimeout(onDetectionTimeout, 1000);
    }
  }

  (async () => {
    const shareId = getShareId();
    if (!shareId) {
      showHeroError(`<strong>No letter here</strong>You need a share link to open a letter.`);
      return;
    }

    // URLSearchParams must NOT be used here — it converts + to space,
    // which corrupts base64 keys (+ is a valid base64 character).
    // Regex + decodeURIComponent handles both old links (raw base64)
    // and new links (encodeURIComponent'd key) safely.
    const rawFragment = window.location.hash.slice(1);
    const keyMatch = rawFragment.match(/(?:^|&)k=([^&]*)/);
    const keyB64 = keyMatch ? decodeURIComponent(keyMatch[1]) : null;
    const isEncrypted = new URLSearchParams(window.location.search).get("e") === "1";
    if (isEncrypted && !keyB64) {
      showHeroError(`<strong>Part of your link got cut off</strong>Ask the sender to resend it, or try opening it in a different browser.`);
      return;
    }

    let encKey = null;
    if (keyB64) {
      try { encKey = await importEncKey(keyB64); }
      catch {
        showHeroError(`<strong>Invalid link</strong>This share link appears to be corrupted or incomplete.`);
        return;
      }
    }

    try {
      const [rawMeta, rawNotes] = await Promise.all([
        fetchJson(`${SUPABASE_URL}/rest/v1/shares?id=eq.${encodeURIComponent(shareId)}&select=*`)
          .then(r => (Array.isArray(r) ? r[0] : null)),
        fetchJson(`${SUPABASE_URL}/rest/v1/annotations?share_id=eq.${encodeURIComponent(shareId)}&select=*`)
          .then(r => Array.isArray(r) ? r : []),
      ]);

      if (!rawNotes.length && !rawMeta) {
        showHeroError(`<strong>Letter not found</strong>This link may be invalid or the notes were removed.`);
        return;
      }

      const notes = encKey
        ? await Promise.all(rawNotes.map(n => decryptNoteFields(n, encKey)))
        : rawNotes;
      const meta = (encKey && rawMeta) ? {
        ...rawMeta,
        sender_name:    await decryptField(rawMeta.sender_name, encKey),
        recipient_name: rawMeta.recipient_name
          ? (looksEncrypted(rawMeta.recipient_name)
              ? await decryptField(rawMeta.recipient_name, encKey)
              : rawMeta.recipient_name)
          : null,
      } : rawMeta;

      document.title = `Keepsake — a letter from ${meta?.sender_name || "someone"}`;
      render(shareId, meta, notes);

    } catch (err) {
      const isTimeout = err.message === "timeout";
      showHeroError(`
        <strong>${isTimeout ? "Still loading…" : "Couldn't load your letter"}</strong>
        ${isTimeout ? "Check your connection and try again." : "Something went wrong. Check your connection and try again."}
        <a href="" style="display:block;margin-top:14px;color:var(--blush);font-weight:600;font-size:13px;">Try again</a>
      `);
    }
  })();
</script>
</body>
</html>
