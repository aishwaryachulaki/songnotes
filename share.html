<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>A letter for you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@500;600;700&display=swap" />
  <style>
    :root {
      --butter:    #F2D88F;
      --blush:     #E36888;
      --tangerine: #F08C21;
      --cream:     #FFFBF4;
      --ink:       #3a2418;
      --ink-mid:   #8a5a48;
      --olive:     #3b3a27;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: none;
    }

    body {
      background: var(--cream) url('background.png') center / cover no-repeat fixed;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    /* ── Hero: fills the viewport, but allowed to grow + scroll for the card ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: visible;
      padding-bottom: clamp(24px, 5vh, 56px);
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 24px;
      flex-shrink: 0;
    }
    .nav-logo {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-size: 21px;
      color: #c0544e;
      text-decoration: none;
    }
    .nav-logo .logo-spark { font-style: normal; color: var(--tangerine); }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .nav-link:hover { opacity: 1; }
    .nav-link--pill {
      background: rgba(227, 104, 136, 0.07);
      border: 1.5px solid rgba(227, 104, 136, 0.40);
      border-radius: 50px;
      padding: 5px 12px;
      color: var(--blush);
      opacity: 1;
    }
    .nav-link--pill:hover {
      background: rgba(227, 104, 136, 0.18);
      border-color: rgba(227, 104, 136, 0.65);
      opacity: 1;
    }

    /* ── Hero content (the received-summary block) ── */
    .hero-content {
      flex: 0 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
      margin-top: clamp(14px, 3vh, 40px);
    }
    .hero-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      opacity: 0.6;
      margin-bottom: clamp(6px, 1.2vh, 14px);
    }
    .hero-title {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(26px, 4vw, 52px);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.15;
      max-width: 520px;
      margin-bottom: clamp(6px, 1vh, 12px);
    }
    .hero-artist {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(13px, 1.4vw, 16px);
      color: var(--blush);
      margin-bottom: clamp(8px, 1.4vh, 16px);
    }
    .hero-artist strong { font-weight: 700; }
    .hero-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(280px, 60vw);
      margin-bottom: clamp(6px, 1.2vh, 12px);
      color: var(--tangerine);
      font-size: 12px;
    }
    .hero-divider::before,
    .hero-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(58, 36, 24, 0.18);
    }
    .hero-count {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: clamp(12px, 1.2vw, 14px);
      color: var(--ink-mid);
      margin-bottom: clamp(2px, 0.5vh, 6px);
    }
    .hero-recipient {
      font-size: clamp(11px, 1.1vw, 13px);
      color: var(--ink-mid);
      opacity: 0.75;
      margin-bottom: 0;
    }
    .hero-recipient strong { color: var(--ink); font-weight: 700; }

    /* ── Action buttons ── */
    .hero-actions {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: clamp(14px, 2.5vh, 28px);
    }
    /* shared pale-pink pill — same values as .prev-activate in popup.css */
    .hero-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(227, 104, 136, 0.07);
      border: 1.5px solid rgba(227, 104, 136, 0.40);
      color: var(--blush);
      border-radius: 50px;
      padding: 9px 22px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .hero-btn:hover {
      background: rgba(227, 104, 136, 0.18);
      border-color: rgba(227, 104, 136, 0.65);
    }
    .hero-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Keepsake card + pop-out stamps ── */
    .keepsake-stage {
      position: relative;
      width: min(680px, 92vw);
      margin: clamp(26px, 5vh, 56px) auto 0;
      flex-shrink: 0;
      outline: none;
    }

    /* Stamps + tickets tuck behind the card and slide out on hover/focus.
       Rotation stays constant (rest↔hover) so they slide rather than spin. */
    .ks-pop {
      position: absolute;
      filter: drop-shadow(0 7px 18px rgba(58,36,24,0.20));
      transition: transform 0.45s cubic-bezier(.22,.61,.36,1), opacity 0.45s ease;
      pointer-events: none;
      will-change: transform;
      opacity: 0.92;
    }
    .ks-stamp-l, .ks-stamp-r { z-index: 1; width: clamp(120px, 15vw, 156px); }  /* portrait stamps, on top */
    .ks-ticket-l, .ks-ticket-r { z-index: 0; width: clamp(150px, 19vw, 205px); } /* landscape tickets, behind */

    /* ── Rest state: tucked behind the card edges ── */
    .ks-stamp-l  { left: 0;  top: 50%; transform: translate(34%, -50%)  rotate(-8deg); }
    .ks-stamp-r  { right: 0; top: 50%; transform: translate(-34%, -50%) rotate(8deg); }
    .ks-ticket-l { left: 0;  top: 50%; transform: translate(40%, -34%)  rotate(60deg); }
    .ks-ticket-r { right: 0; top: 50%; transform: translate(-40%, -34%) rotate(-60deg); }

    /* ── Hover / focus: card lifts, pieces slide outward ── */
    .keepsake-stage:hover  .keepsake-card,
    .keepsake-stage:focus-within .keepsake-card,
    .keepsake-stage:focus  .keepsake-card { transform: translateY(-4px); }

    .keepsake-stage:hover  .ks-stamp-l,
    .keepsake-stage:focus-within .ks-stamp-l,
    .keepsake-stage:focus  .ks-stamp-l  { transform: translate(calc(-66% - 15px), -50%) rotate(-8deg); opacity: 1; }
    .keepsake-stage:hover  .ks-stamp-r,
    .keepsake-stage:focus-within .ks-stamp-r,
    .keepsake-stage:focus  .ks-stamp-r  { transform: translate(calc(66% + 15px), -50%)  rotate(8deg);  opacity: 1; }
    .keepsake-stage:hover  .ks-ticket-l,
    .keepsake-stage:focus-within .ks-ticket-l,
    .keepsake-stage:focus  .ks-ticket-l { transform: translate(calc(-72% - 50px), -28%) rotate(60deg); opacity: 1; }
    .keepsake-stage:hover  .ks-ticket-r,
    .keepsake-stage:focus-within .ks-ticket-r,
    .keepsake-stage:focus  .ks-ticket-r { transform: translate(calc(72% + 50px), -28%)  rotate(-60deg);  opacity: 1; }

    .keepsake-card {
      position: relative;
      z-index: 2;
      background: #f3c4b6 url('card.webp') center / 100% 100% no-repeat;
      border-radius: 18px;
      padding: 30px 34px 30px 39px;
      overflow: hidden;
      min-height: 300px;
      box-shadow: 0 18px 50px rgba(58,36,24,0.16);
      transition: transform 0.42s cubic-bezier(.22,.61,.36,1);
      text-align: left;
    }

    .kc-floral {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(calc(-50% + 55px));
      width: 22%;
      max-width: 136px;
      opacity: 0.12;
      pointer-events: none;
      user-select: none;
    }

    .kc-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blush);
      margin-bottom: 10px;
      position: relative; z-index: 1;
    }
    .kc-title {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(26px, 3.4vw, 40px);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.1;
      max-width: 62%;
      position: relative; z-index: 1;
    }
    .kc-by {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 15px;
      color: var(--ink-mid);
      margin-top: 4px;
      position: relative; z-index: 1;
    }
    .kc-by strong { color: var(--blush); font-weight: 700; font-style: normal; }

    .kc-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 62%;
      margin: 16px 0;
      color: var(--tangerine);
      font-size: 11px;
      position: relative; z-index: 1;
    }
    .kc-divider span {
      flex: 1;
      height: 1px;
      background: rgba(58,36,24,0.16);
    }

    .kc-desc {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-size: clamp(14px, 1.4vw, 16px);
      line-height: 1.6;
      color: var(--ink-mid);
      max-width: 62%;
      margin-bottom: 22px;
      position: relative; z-index: 1;
    }
    .kc-desc.hidden { display: none; }

    /* No-description state: hide divider, keep title close to stats */
    .keepsake-card.kc-no-desc .kc-divider { display: none; }
    .keepsake-card.kc-no-desc .kc-title   { margin-bottom: 24px; }

    .kc-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 62%;
      padding-top: 16px;
      border-top: 1px solid rgba(58,36,24,0.10);
      position: relative; z-index: 1;
    }
    .kc-stat { display: flex; flex-direction: column; gap: 4px; }
    .kc-stat-k {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--ink-mid);
      opacity: 0.6;
    }
    .kc-stat-v {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--ink);
    }
    .kc-stat-v--accent { color: var(--blush); }

    @media (prefers-reduced-motion: reduce) {
      .ks-pop { transition: none; opacity: 1; }
      .ks-stamp-l  { transform: translate(-66%, -50%) rotate(-8deg); }
      .ks-stamp-r  { transform: translate(66%, -50%)  rotate(8deg); }
      .ks-ticket-l { transform: translate(-72%, -28%) rotate(60deg); }
      .ks-ticket-r { transform: translate(72%, -28%)  rotate(-60deg); }
      .keepsake-card { transition: none; }
    }

    @media (max-width: 560px) {
      .keepsake-card { padding: 22px 20px; }
      .kc-title, .kc-divider, .kc-desc, .kc-stats { max-width: 80%; }
      .kc-floral { width: 24.2%; opacity: 0.09; }
      .ks-stamp-l, .ks-stamp-r { width: clamp(86px, 22vw, 112px); }
      .ks-ticket-l, .ks-ticket-r { width: clamp(108px, 27vw, 150px); }
      /* gentler travel on small screens */
      .keepsake-stage:hover  .ks-stamp-l,
      .keepsake-stage:focus-within .ks-stamp-l { transform: translate(-52%, -50%) rotate(-8deg); }
      .keepsake-stage:hover  .ks-stamp-r,
      .keepsake-stage:focus-within .ks-stamp-r { transform: translate(52%, -50%) rotate(8deg); }
      .keepsake-stage:hover  .ks-ticket-l,
      .keepsake-stage:focus-within .ks-ticket-l { transform: translate(-56%, -28%) rotate(60deg); }
      .keepsake-stage:hover  .ks-ticket-r,
      .keepsake-stage:focus-within .ks-ticket-r { transform: translate(56%, -28%) rotate(-60deg); }
    }

    /* ── Discover link ── */
    .discover-link {
      display: block;
      margin-top: auto;
      padding-top: 28px;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-mid);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .discover-link:hover { opacity: 1; }

    /* ── Loading / error states ── */
    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-mid);
      font-size: 14px;
      line-height: 1.6;
    }
    .state strong { color: var(--ink); display: block; font-size: 20px; margin-bottom: 8px; }
    .state.loading { color: var(--blush); font-family: 'Lora', Georgia, serif; font-style: italic; font-size: 16px; }
    .loading-dot {
      display: inline-block;
      animation: ks-pulse 1.6s ease-in-out infinite;
    }
    @keyframes ks-pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.85); }
    }
  </style>
</head>
<body>

<div class="hero" id="heroSection">
  <nav class="nav">
    <a class="nav-logo" href="index.html">keepsake.<span class="logo-spark">✦</span></a>
    <div class="nav-links">
      <a href="notes.html" class="nav-link">Notes</a>
      <a href="account.html" class="nav-link">Account</a>
      <a href="auth.html" class="nav-link nav-link--pill">Sign out</a>
    </div>
  </nav>
  <div class="keepsake-stage" id="keepsakeStage" tabindex="0" aria-label="Your keepsake" style="display:none">
    <img class="ks-pop ks-ticket-l" src="ticket-green.webp"    alt="" aria-hidden="true" />
    <img class="ks-pop ks-ticket-r" src="ticket-pink.webp"     alt="" aria-hidden="true" />
    <img class="ks-pop ks-stamp-l"  src="stamp-lavender.webp"  alt="" aria-hidden="true" />
    <img class="ks-pop ks-stamp-r"  src="stamp-rose.webp"      alt="" aria-hidden="true" />
    <article class="keepsake-card">
      <img class="kc-floral" src="poppy.png" alt="" aria-hidden="true" />
      <div class="kc-eyebrow">A keepsake for you</div>
      <h2 class="kc-title" id="kcTitle"></h2>
      <div class="kc-divider"><span></span>✦<span></span></div>
      <p class="kc-desc hidden" id="kcDesc"></p>
      <div class="kc-stats">
        <div class="kc-stat"><span class="kc-stat-k">Notes inside</span><span id="kcNotes" class="kc-stat-v"></span></div>
        <div class="kc-stat"><span class="kc-stat-k">Type</span><span id="kcType" class="kc-stat-v"></span></div>
        <div class="kc-stat"><span class="kc-stat-k">Sent by</span><span id="kcSentBy" class="kc-stat-v kc-stat-v--accent"></span></div>
      </div>
    </article>
  </div>
  <div id="heroContent" class="hero-content">
    <div class="state loading"><span class="loading-dot">✦</span> opening your letter…</div>
  </div>
  <a href="index.html" class="discover-link" id="discoverLink" style="display:none">New to Keepsake? Find out more →</a>
</div>

<script>
  const SUPABASE_URL = "https://kkasgbkgwjxiutdalbbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYXNnYmtnd2p4aXV0ZGFsYmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjU3OTQsImV4cCI6MjA5Mjg0MTc5NH0.z1JLMTzz3X_swbWHdt2z4UDKyUwjEfNYys5kdDMq3R4";
  // TODO: replace with real Chrome Web Store URL once the extension is published.
  // e.g. "https://chromewebstore.google.com/detail/keepsake/YOUR_EXTENSION_ID"
  const EXTENSION_CWS_URL = "index.html";

  function getShareId() {
    const params = new URLSearchParams(window.location.search);
    if (params.get("id")) return params.get("id");
    const m = window.location.pathname.match(/\/share\/([a-z0-9_-]+)/i);
    return m ? m[1] : null;
  }

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }

  async function fetchJson(url, timeoutMs = 9000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!res.ok) return null;
      return res.json();
    } catch (err) {
      clearTimeout(timer);
      if (err.name === "AbortError") throw new Error("timeout");
      throw err;
    }
  }

  async function importEncKey(b64) {
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    return crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, false, ["decrypt"]);
  }
  function looksEncrypted(s) {
    return s && s.length > 30 && !/\s/.test(s) && /^[A-Za-z0-9+\/=]+$/.test(s);
  }
  async function decryptField(b64, key) {
    if (b64 == null) return null;
    try {
      const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const dec = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: buf.slice(0, 12) },
        key,
        buf.slice(12)
      );
      return new TextDecoder().decode(dec);
    } catch { return b64; }
  }
  async function decryptNoteFields(note, key) {
    return {
      ...note,
      note:         await decryptField(note.note, key),
      track_title:  await decryptField(note.track_title, key),
      track_artist: await decryptField(note.track_artist, key),
      sender_name:  await decryptField(note.sender_name, key),
    };
  }

  function isLocalTrack(trackId) {
    return !trackId || trackId.startsWith("local:");
  }
  function spotifyLink(meta, notes) {
    if (meta?.playlist_url) return meta.playlist_url;
    if (meta?.playlist_id) return `https://open.spotify.com/playlist/${meta.playlist_id}`;
    const firstNote = notes[0];
    const trackId = firstNote?.track_id;
    if (isLocalTrack(trackId)) {
      const q = [firstNote?.track_title, firstNote?.track_artist].filter(Boolean).join(" ");
      return q ? `https://open.spotify.com/search/${encodeURIComponent(q)}` : null;
    }
    return `https://open.spotify.com/track/${trackId}`;
  }
  function spotifyLabel(meta, notes) {
    if (meta?.playlist_url || meta?.playlist_id) return "Open playlist in Spotify";
    const trackId = notes[0]?.track_id;
    if (isLocalTrack(trackId)) return "Search on Spotify";
    return "Open in Spotify";
  }

  function showHeroError(html) {
    document.getElementById("heroContent").innerHTML = `<div class="state">${html}</div>`;
  }

  function render(shareId, meta, notes) {
    const sender = meta?.sender_name || notes[0]?.sender_name || "someone";

    const byTrack = {};
    notes.forEach(n => {
      if (!byTrack[n.track_id]) byTrack[n.track_id] = { title: n.track_title, artist: n.track_artist };
    });
    const trackCount = Object.keys(byTrack).length;
    const recipient = meta?.recipient_name || null;
    const totalNotes = notes.length;

    const isPlaylist = trackCount > 1 || !!(meta?.playlist_name);
    const heroTitle = isPlaylist
      ? (meta?.playlist_name || "A Playlist Share")
      : (notes[0]?.track_title || "A song");
    const heroArtist = isPlaylist ? sender : (notes[0]?.track_artist || "");

    const spLink = spotifyLink(meta, notes);

    // Reveal the card (hidden during load/error) and put the actions + discover
    // link below it. The card itself now carries the title/sender/etc.
    const stageEl = document.getElementById("keepsakeStage");
    if (stageEl) stageEl.style.display = "";
    const heroEl = document.getElementById("heroContent");
    heroEl.innerHTML = `
      <div class="hero-actions" id="heroActions"></div>
    `;
    const discover = document.getElementById("discoverLink");
    if (discover) discover.style.display = "";

    // ── Populate the keepsake card ──
    const typeLabel = (() => {
      const t = meta?.share_type;
      if (t === "playlist") return "Playlist";
      if (t === "multi")    return "Multi-song";
      if (t === "single")   return "Song";
      return isPlaylist ? "Playlist" : (trackCount > 1 ? "Multi-song" : "Song");
    })();
    const setText = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
    setText("kcTitle", heroTitle);
    setText("kcNotes", String(totalNotes));
    setText("kcType", typeLabel);
    setText("kcSentBy", sender);
    const kcDesc = document.getElementById("kcDesc");
    const card = document.querySelector(".keepsake-card");
    if (kcDesc) {
      const desc = (meta?.description && !looksEncrypted(meta.description)) ? String(meta.description).trim() : "";
      if (desc) {
        kcDesc.textContent = desc;
        kcDesc.classList.remove("hidden");
        card?.classList.remove("kc-no-desc");
      } else {
        kcDesc.classList.add("hidden");
        card?.classList.add("kc-no-desc");
      }
    }

    window.__KS_PAYLOAD = { share_id: shareId, share: meta || {}, notes };

    let detected = false;

    function onExtensionReady() {
      if (detected) return;
      detected = true;
      const actions = document.getElementById("heroActions");
      if (!actions) return;

      // Import button
      const btn = document.createElement("button");
      btn.className = "hero-btn";
      btn.id = "importBtn";
      btn.textContent = "✧ Import into Keepsake";
      actions.appendChild(btn);
      btn.addEventListener("click", () => {
        window.__KS_PAYLOAD = { share_id: shareId, share: meta || {}, notes };
        window.dispatchEvent(new CustomEvent("keepsake:import", { detail: window.__KS_PAYLOAD }));
        window.addEventListener("keepsake:imported", () => {
          btn.disabled = true;
          btn.textContent = "✧ Imported!";
        }, { once: true });
      });

      // Spotify button — only shown once extension is confirmed
      if (spLink) {
        const a = document.createElement("a");
        a.className = "hero-btn";
        a.href = spLink;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = `✧ ${spotifyLabel(meta, notes)}`;
        actions.appendChild(a);
      }

      window.dispatchEvent(new CustomEvent("keepsake:import", { detail: window.__KS_PAYLOAD }));
    }

    function onDetectionTimeout() {
      if (detected) return;
      detected = true;
      // Extension not installed — only show the install prompt, no Spotify access
      if (!EXTENSION_CWS_URL) return;
      const actions = document.getElementById("heroActions");
      if (!actions) return;
      const a = document.createElement("a");
      a.className = "hero-btn";
      a.href = EXTENSION_CWS_URL;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = "✧ Get Keepsake, it's free";
      actions.appendChild(a);
    }

    window.addEventListener("keepsake:ready", onExtensionReady, { once: true });
    if (document.documentElement.getAttribute("data-keepsake-installed") === "1") {
      onExtensionReady();
    } else {
      setTimeout(onDetectionTimeout, 1000);
    }
  }

  (async () => {
    const shareId = getShareId();
    if (!shareId) {
      showHeroError(`<strong>No letter here</strong>You need a share link to open a letter.`);
      return;
    }

    // URLSearchParams must NOT be used here — it converts + to space,
    // which corrupts base64 keys (+ is a valid base64 character).
    // Regex + decodeURIComponent handles both old links (raw base64)
    // and new links (encodeURIComponent'd key) safely.
    const rawFragment = window.location.hash.slice(1);
    const keyMatch = rawFragment.match(/(?:^|&)k=([^&]*)/);
    const keyB64 = keyMatch ? decodeURIComponent(keyMatch[1]) : null;
    const isEncrypted = new URLSearchParams(window.location.search).get("e") === "1";
    if (isEncrypted && !keyB64) {
      showHeroError(`<strong>Part of your link got cut off</strong>Ask the sender to resend it, or try opening it in a different browser.`);
      return;
    }

    let encKey = null;
    if (keyB64) {
      try { encKey = await importEncKey(keyB64); }
      catch {
        showHeroError(`<strong>Invalid link</strong>This share link appears to be corrupted or incomplete.`);
        return;
      }
    }

    try {
      // One letter by its id via the get_share() RPC (bypasses RLS safely);
      // direct table reads are locked to owners/recipients, so this is the
      // only public read path — and it can't enumerate other letters.
      const bundle = await fetchJson(`${SUPABASE_URL}/rest/v1/rpc/get_share?p_share_id=${encodeURIComponent(shareId)}`);
      const rawMeta = bundle && bundle.meta ? bundle.meta : null;
      const rawNotes = bundle && Array.isArray(bundle.notes) ? bundle.notes : [];

      if (!rawNotes.length && !rawMeta) {
        showHeroError(`<strong>Letter not found</strong>This link may be invalid or the notes were removed.`);
        return;
      }

      const notes = encKey
        ? await Promise.all(rawNotes.map(n => decryptNoteFields(n, encKey)))
        : rawNotes;
      const meta = (encKey && rawMeta) ? {
        ...rawMeta,
        sender_name:    await decryptField(rawMeta.sender_name, encKey),
        recipient_name: rawMeta.recipient_name
          ? (looksEncrypted(rawMeta.recipient_name)
              ? await decryptField(rawMeta.recipient_name, encKey)
              : rawMeta.recipient_name)
          : null,
        description: rawMeta.description
          ? (looksEncrypted(rawMeta.description)
              ? await decryptField(rawMeta.description, encKey)
              : rawMeta.description)
          : null,
      } : rawMeta;

      document.title = `A letter from ${meta?.sender_name || "someone"}`;
      render(shareId, meta, notes);

    } catch (err) {
      const isTimeout = err.message === "timeout";
      showHeroError(`
        <strong>${isTimeout ? "Still loading…" : "Couldn't load your letter"}</strong>
        ${isTimeout ? "Check your connection and try again." : "Something went wrong. Check your connection and try again."}
        <a href="" style="display:block;margin-top:14px;color:var(--blush);font-weight:600;font-size:13px;">Try again</a>
      `);
    }
  })();
</script>
</body>
</html>
