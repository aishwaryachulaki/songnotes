<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keepsake — My Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@500;600;700&display=swap" />
  <style>
    :root {
      --rose:      #D96B7C;
      --tangerine: #F08C21;
      --cream:     #FFFBF4;
      --bg:        #F4D9A6;
      --ink:       #3A2E2A;
      --ink-mid:   #6B5A52;
      --ink-lt:    #A08878;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg) url('background.png') center / cover no-repeat fixed;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      color: var(--ink);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px 80px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Nav ── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 0 10px;
    }
    .nav-logo {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400; font-size: 26px;
      color: #C04E6A; text-decoration: none; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 5px;
      text-shadow: 0 1px 12px rgba(140,50,60,0.13);
    }
    .nav-logo .logo-spark {
      font-style: normal; font-family: sans-serif;
      font-size: 11px; color: var(--tangerine); font-weight: 400;
      vertical-align: super; line-height: 0;
    }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-mid);
      text-decoration: none; opacity: 0.65; transition: opacity 0.15s;
    }
    .nav-link:hover { opacity: 1; }
    .nav-link.active { opacity: 1; color: var(--rose); }
    .btn-signout {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 20px;
      background: rgba(217,107,124,0.10);
      border: 1.5px solid rgba(217,107,124,0.30);
      color: var(--rose); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-signout:hover { background: rgba(217,107,124,0.18); }

    /* ── Section header ── */
    .section-header { display: flex; align-items: center; gap: 10px; }
    .section-header span {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--rose); white-space: nowrap;
      opacity: 0.75;
    }
    .section-header::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(217,107,124,0.22);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1.5px solid rgba(58,36,24,0.10);
    }
    .tab {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: 0.10em;
      text-transform: uppercase; padding: 8px 20px 10px;
      border: none; background: none; cursor: pointer;
      color: var(--ink-lt);
      border-bottom: 2px solid transparent;
      margin-bottom: -1.5px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--rose); border-bottom-color: var(--rose); }
    .tab:hover:not(.active) { color: var(--ink-mid); }

    /* ── Share grid ── */
    .shares-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    @media (max-width: 1100px) { .shares-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 800px)  { .shares-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 520px)  { .shares-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .page { padding: 0 20px 60px; } }

    /* Full-width row for expanded relive panel — sits between grid rows */
    .relive-row {
      grid-column: 1 / -1;
    }

    .share-card {
      border-radius: 14px;
      padding: 16px 16px 14px;
      position: relative; overflow: hidden;
      transition: filter 0.15s;
      display: flex; flex-direction: column;
      aspect-ratio: 1;
      cursor: default;
    }
    .share-card:hover { filter: brightness(0.97); }

    /* Sent tab colours */
    .sent-list .share-card:nth-child(3n+1) { background: url('faq-bg-yellow.png') center / cover no-repeat; color: #4a3800; }
    .sent-list .share-card:nth-child(3n+2) { background: url('faq-bg-pink.png')   center / cover no-repeat; color: #5c2d2d; }
    .sent-list .share-card:nth-child(3n+3) { background: url('faq-bg-olive.png')  center / cover no-repeat; color: #363614; }

    /* Received tab colours */
    .received-list .share-card:nth-child(3n+1) { background: url('faq-bg-pink.png')   center / cover no-repeat; color: #5c2d2d; }
    .received-list .share-card:nth-child(3n+2) { background: url('faq-bg-olive.png')  center / cover no-repeat; color: #363614; }
    .received-list .share-card:nth-child(3n+3) { background: url('faq-bg-yellow.png') center / cover no-repeat; color: #4a3800; }

    /* ✦ top-right */
    .share-card::after {
      content: '✦';
      position: absolute; right: 14px; top: 13px;
      font-size: 15px; opacity: 0.18; pointer-events: none;
    }

    /* Top row: "For name" */
    .share-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px; font-weight: 700; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--rose);
      padding-right: 22px; /* clear the ✦ */
      margin-bottom: 10px;
    }

    /* Body: title + artist sit just below the label, flex:1 pushes footer to bottom */
    .share-body { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }

    .share-type-pill {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 7.5px; font-weight: 700; letter-spacing: 0.10em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 8px;
      background: rgba(217,107,124,0.12); color: var(--rose);
      margin-bottom: 8px; align-self: flex-start;
    }
    .share-track {
      font-family: 'Lora', Georgia, serif;
      font-size: 16px; font-weight: 700; line-height: 1.25;
      margin-bottom: 4px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .share-artist {
      font-size: 11px; opacity: 0.55;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Bottom row: meta (date + notes stacked) + action button */
    .share-footer {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-top: 12px; gap: 6px;
    }
    .share-meta { display: flex; flex-direction: column; gap: 2px; }
    .share-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px; letter-spacing: 0.03em; opacity: 0.45;
    }
    .share-note-count {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px; letter-spacing: 0.03em; opacity: 0.45;
    }
    .share-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 5px 12px; border-radius: 20px;
      background: rgba(217,107,124,0.12);
      border: 1.5px solid rgba(217,107,124,0.30);
      color: var(--rose); cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    .btn-sm:hover { background: rgba(217,107,124,0.20); }
    .btn-sm-outline {
      background: transparent;
      border-color: rgba(58,36,24,0.20);
      color: inherit;
      opacity: 0.55;
    }
    .btn-sm-outline:hover { background: rgba(58,36,24,0.06); opacity: 0.9; }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 4px;
    }
    .page-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.10em;
      text-transform: uppercase; padding: 6px 16px; border-radius: 20px;
      background: rgba(217,107,124,0.10);
      border: 1.5px solid rgba(217,107,124,0.25);
      color: var(--rose); cursor: pointer; transition: background 0.15s;
    }
    .page-btn:hover:not(:disabled) { background: rgba(217,107,124,0.18); }
    .page-btn:disabled { opacity: 0.30; cursor: default; }
    .page-info {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; letter-spacing: 0.06em; color: var(--ink-lt); opacity: 0.7;
    }
    /* ── Expanded notes view ── */
    .notes-expanded {
      margin-top: 16px;
      border-top: 1px solid rgba(58,36,24,0.12);
      padding-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .note-entry {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .note-timestamp {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; opacity: 0.45;
    }
    .note-song {
      font-family: 'Lora', Georgia, serif;
      font-size: 12px; font-weight: 600; opacity: 0.70;
    }
    .note-text {
      font-family: 'Lora', Georgia, serif;
      font-size: 14px; line-height: 1.65;
      font-style: italic;
    }

    /* ── Empty state ── */
    .empty-state {
      border-radius: 14px; padding: 52px 32px; text-align: center;
    }
    .empty-state.sent-empty     { background: url('faq-bg-yellow.png') center / cover no-repeat; color: #4a3800; }
    .empty-state.received-empty { background: url('faq-bg-pink.png')   center / cover no-repeat; color: #5c2d2d; }
    .empty-icon { font-size: 28px; opacity: 0.28; margin-bottom: 16px; }
    .empty-title { font-family: 'Lora', Georgia, serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .empty-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 14px; color: var(--rose); opacity: 0.85; line-height: 1.55;
    }

    /* ── Notice (received not set up yet) ── */
    .notice-card {
      border-radius: 14px; padding: 26px 26px 24px;
      position: relative; overflow: hidden;
    }
    .notice-card:nth-child(1) { background: url('faq-bg-pink.png') center / cover no-repeat; color: #5c2d2d; }
    .notice-card:nth-child(2) { background: url('faq-bg-olive.png') center / cover no-repeat; color: #363614; margin-top: 0; }
    .notice-card::after {
      content: '✦'; position: absolute; right: 22px; top: 18px;
      font-size: 26px; opacity: 0.09; pointer-events: none;
    }
    .notice-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 10px;
    }
    .notice-title { font-family: 'Lora', Georgia, serif; font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .notice-body { font-size: 13.5px; line-height: 1.65; opacity: 0.72; margin-bottom: 12px; }
    .notice-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 13px; color: var(--rose); opacity: 0.85;
    }
    .notice-steps { font-size: 13.5px; line-height: 1.85; opacity: 0.72; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: var(--cream);
      font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 0.04em;
      padding: 9px 20px; border-radius: 20px;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
      white-space: nowrap; z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* ── Loading / error ── */
    .state {
      text-align: center; padding: 80px 20px;
      color: var(--ink-mid); font-size: 14px; line-height: 1.6;
    }
    .state strong {
      font-family: 'Lora', Georgia, serif;
      display: block; font-size: 20px; color: var(--ink); margin-bottom: 8px;
    }

    /* ── Paste-link fallback ── */
    .paste-link-wrap {
      margin-top: 14px;
      border-top: 1px solid rgba(58,36,24,0.12);
      padding-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .paste-link-label {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 13px; opacity: 0.65;
    }
    .paste-link-row { display: flex; gap: 8px; }
    .paste-link-input {
      flex: 1; font-family: 'Lora', Georgia, serif;
      font-size: 12px; padding: 7px 12px; border-radius: 10px;
      border: 1.5px solid rgba(58,36,24,0.18);
      background: rgba(255,251,244,0.7); color: var(--ink);
      outline: none;
    }
    .paste-link-input:focus { border-color: rgba(217,107,124,0.40); }
    .paste-link-error {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; color: var(--rose); opacity: 0.8;
    }

    /* ── Footer ── */
    .footer-links {
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; color: var(--ink-lt); letter-spacing: 0.04em;
      opacity: 0.7;
    }
    .footer-links a { color: var(--ink-lt); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="page" id="page">
  <div class="state"><strong>Loading…</strong></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://kkasgbkgwjxiutdalbbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYXNnYmtnd2p4aXV0ZGFsYmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjU3OTQsImV4cCI6MjA5Mjg0MTc5NH0.z1JLMTzz3X_swbWHdt2z4UDKyUwjEfNYys5kdDMq3R4";

  // ── Crypto helpers (mirrors popup.js) ──
  async function importEncKey(b64) {
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    return crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, false, ["decrypt"]);
  }
  async function decryptField(b64, key) {
    if (!b64) return null;
    try {
      const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: buf.slice(0, 12) }, key, buf.slice(12));
      return new TextDecoder().decode(dec);
    } catch { return null; }
  }

  // ── Extension detection ──
  let extensionPresent = false;
  window.addEventListener("keepsake:extension_present", () => { extensionPresent = true; }, { once: true });

  // Ask extension for a share's enc_key; resolves with key b64 or null
  function getKeyFromExtension(shareId) {
    return new Promise((resolve) => {
      if (!extensionPresent) { resolve(null); return; }
      const handler = (e) => {
        if (e.detail?.shareId === shareId) {
          window.removeEventListener("keepsake:share_key_response", handler);
          resolve(e.detail.encKey || null);
        }
      };
      window.addEventListener("keepsake:share_key_response", handler);
      window.dispatchEvent(new CustomEvent("keepsake:get_share_key", { detail: { shareId } }));
      setTimeout(() => { window.removeEventListener("keepsake:share_key_response", handler); resolve(null); }, 1500);
    });
  }

  // Extract enc_key from a pasted share URL (#k=...)
  function keyFromUrl(url) {
    try {
      const hash = url.includes("#") ? url.split("#")[1] : "";
      const params = new URLSearchParams(hash);
      return params.get("k") || null;
    } catch { return null; }
  }
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2400);
  }

  let currentUser = null;
  let sentShares = [];
  let receivedItems = [];
  let hasArchivedCol = false;
  let hasReceivedTable = false;
  let activeTab = "sent";
  let sentPage = 0;
  let receivedPage = 0;
  const PAGE_SIZE = 10;

  // Read tab from URL hash
  if (location.hash === "#received") activeTab = "received";
  else if (location.hash === "#sent") activeTab = "sent";

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = "auth.html"; return; }
    currentUser = session.user;
    await loadAll();
  })();

  async function loadAll() {
    // Load sent shares — sender_content is the plaintext copy written at send time.
    // annotations is kept as fallback for older plaintext shares.
    const sentRes = await sb
      .from("shares")
      .select("*, sender_content, annotations(id, track_title, track_artist, note, timestamp)")
      .order("created_at", { ascending: false });

    sentShares = sentRes.data || [];

    // Check if archived column exists
    if (sentShares.length > 0) {
      hasArchivedCol = "archived" in sentShares[0];
    } else {
      const probe = await sb.from("shares").select("archived").limit(1);
      hasArchivedCol = !probe.error;
    }

    // Load received shares
    const recRes = await sb
      .from("received_shares")
      .select(`id, imported_at, shares(id, share_type, sender_name, recipient_name, created_at, annotations(id, track_title, track_artist, note))`)
      .order("imported_at", { ascending: false });

    if (!recRes.error) {
      hasReceivedTable = true;
      receivedItems = recRes.data || [];
    } else {
      hasReceivedTable = recRes.error.code !== "42P01"; // table missing vs other error
      receivedItems = [];
    }

    render();
  }

  function render() {
    const page = document.getElementById("page");

    const nav = `
      <div class="nav">
        <a class="nav-logo" href="index.html">keepsake.<span class="logo-spark">✦</span></a>
        <div class="nav-right">
          <a class="nav-link active" href="notes.html">Notes</a>
          <a class="nav-link" href="account.html">Account</a>
          <button class="btn-signout" id="signoutBtn">Sign out</button>
        </div>
      </div>
    `;

    const tabs = `
      <div class="tabs">
        <button class="tab ${activeTab === "sent" ? "active" : ""}" data-tab="sent">Sent</button>
        <button class="tab ${activeTab === "received" ? "active" : ""}" data-tab="received">Received</button>
      </div>
    `;

    const content = activeTab === "sent" ? renderSent() : renderReceived();

    page.innerHTML = `
      ${nav}
      <div class="section-header"><span>Your notes</span></div>
      ${tabs}
      ${content}
      <div class="footer-links">
        <a href="privacy.html" target="_blank">Privacy Policy</a>
        &nbsp;·&nbsp;
        <a href="index.html">Home</a>
      </div>
    `;

    // Tab switching
    page.querySelectorAll(".tab[data-tab]").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        sentPage = 0; receivedPage = 0;
        location.hash = activeTab === "received" ? "received" : "";
        render();
      });
    });

    // Pagination
    page.querySelector("[data-prev]")?.addEventListener("click", () => {
      if (activeTab === "sent") sentPage--; else receivedPage--;
      render();
    });
    page.querySelector("[data-next]")?.addEventListener("click", () => {
      if (activeTab === "sent") sentPage++; else receivedPage++;
      render();
    });

    // Sign out
    document.getElementById("signoutBtn").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "auth.html";
    });

    // Silently decrypt any encrypted recipient labels using extension keys
    if (activeTab === "sent") tryDecryptLabels();

    // Sent list — relive / paste-link / decrypt
    const sentList = page.querySelector(".sent-list");
    if (sentList) {
      sentList.addEventListener("click", async (e) => {
        // Copy link
        const copyBtn = e.target.closest("[data-copy]");
        if (copyBtn) {
          const shareId = copyBtn.dataset.copy;
          copyBtn.textContent = "…";
          copyBtn.disabled = true;
          const keyB64 = await getKeyFromExtension(shareId);
          if (keyB64) {
            const url = `https://aishwaryachulaki.github.io/songnotes/share.html?id=${shareId}&e=1#k=${keyB64}`;
            try {
              await navigator.clipboard.writeText(url);
              showToast("Link copied ✦");
            } catch {
              showToast("Couldn't access clipboard — try from the extension.");
            }
          } else {
            showToast("Extension not detected — open the extension to copy the link.");
          }
          copyBtn.textContent = "Link";
          copyBtn.disabled = false;
          return;
        }

        // Close button
        const closeBtn = e.target.closest("[data-relive-close]");
        if (closeBtn) {
          const id = closeBtn.dataset.reliveClose;
          document.getElementById(`relive-${id}`)?.remove();
          const btn = document.querySelector(`[data-relive="${id}"]`);
          if (btn) btn.textContent = "Relive ✦";
          return;
        }

        // Relive button — try extension first, fall back to paste UI
        const reliveBtn = e.target.closest("[data-relive]");
        if (!reliveBtn) return;
        const id = reliveBtn.dataset.relive;
        const share = sentShares.find(s => s.id === id);
        if (!share || !share.sender_content) return;

        // Already open → close
        if (document.getElementById(`relive-${id}`)) {
          document.getElementById(`relive-${id}`)?.remove();
          reliveBtn.textContent = "Relive ✦";
          return;
        }

        reliveBtn.textContent = "Opening…";
        reliveBtn.disabled = true;

        const keyB64 = await getKeyFromExtension(id);
        if (keyB64) {
          await expandWithKey(id, share, keyB64, reliveBtn);
        } else {
          // Extension not present or key not found — show paste UI
          showPasteUI(id, share, reliveBtn);
        }
      });

      // Paste-link submit
      sentList.addEventListener("click", async (e) => {
        const submitBtn = e.target.closest("[data-paste-submit]");
        if (!submitBtn) return;
        const id = submitBtn.dataset.pasteSubmit;
        const share = sentShares.find(s => s.id === id);
        const input = document.getElementById(`paste-input-${id}`);
        const errEl = document.getElementById(`paste-err-${id}`);
        const reliveBtn = document.querySelector(`[data-relive="${id}"]`);
        if (!input || !share) return;

        const keyB64 = keyFromUrl(input.value.trim());
        if (!keyB64) {
          errEl.textContent = "Couldn't find the key — make sure you paste the full link, including the part after #.";
          return;
        }
        errEl.textContent = "";
        submitBtn.disabled = true;
        await expandWithKey(id, share, keyB64, reliveBtn);
      });
    }
  }

  // After rendering, quietly decrypt any encrypted recipient names via the extension
  async function tryDecryptLabels() {
    const toDecrypt = sentShares.filter(s => looksEncrypted(s.recipient_name));
    for (const share of toDecrypt) {
      const keyB64 = await getKeyFromExtension(share.id);
      if (!keyB64) continue;
      try {
        const cryptoKey = await importEncKey(keyB64);
        const name = await decryptField(share.recipient_name, cryptoKey);
        if (!name) continue;
        // Update the label on the rendered card
        const card = document.querySelector(`[data-relive="${share.id}"]`)?.closest(".share-card");
        if (card) {
          const label = card.querySelector(".share-label");
          if (label) label.textContent = `For ${name}`;
        }
        // Cache it so Relive can also show it
        share._decryptedRecipient = name;
      } catch { /* leave as fallback */ }
    }
  }

  async function expandWithKey(id, share, keyB64, reliveBtn) {
    try {
      const cryptoKey = await importEncKey(keyB64);
      const json = await decryptField(share.sender_content, cryptoKey);
      if (!json) throw new Error("decrypt failed");
      const parsed = JSON.parse(json);
      // Support both old format (array) and new format ({recipient_name, notes})
      const notes = Array.isArray(parsed) ? parsed : (parsed.notes || []);
      // Update the recipient label if we now have the plaintext name
      const recipientName = parsed.recipient_name || share._decryptedRecipient;
      if (recipientName) {
        const card = reliveBtn?.closest(".share-card");
        const label = card?.querySelector(".share-label");
        if (label) label.textContent = `For ${recipientName}`;
      }
      const isPlaylist = share.share_type === "playlist";

      const notesHtml = notes.map(n => {
        const ts = formatTimestamp(n.timestamp);
        return `
          <div class="note-entry">
            ${isPlaylist && n.track_title ? `<div class="note-song">${esc(n.track_title)}${n.track_artist ? ` — ${esc(n.track_artist)}` : ""}</div>` : ""}
            ${ts ? `<div class="note-timestamp">${ts}</div>` : ""}
            <div class="note-text">${esc(n.note || "")}</div>
          </div>`;
      }).join("");

      const wrap = document.createElement("div");
      wrap.className = "notes-expanded relive-row";
      wrap.id = `relive-${id}`;
      wrap.innerHTML = `
        ${notesHtml || `<div style="font-size:13px;opacity:0.5;">No notes found.</div>`}
        <div style="margin-top:4px;">
          <button class="btn-sm-ghost" data-relive-close="${esc(id)}" style="opacity:0.45;font-size:9px;">Close</button>
        </div>`;

      // Remove any existing panel, then insert after the card's row in the grid
      document.getElementById(`relive-${id}`)?.remove();
      const card = reliveBtn?.closest(".share-card");
      if (card) card.after(wrap);
      if (reliveBtn) { reliveBtn.textContent = "Relive ✦"; reliveBtn.disabled = false; }
    } catch {
      if (reliveBtn) { reliveBtn.textContent = "Relive ✦"; reliveBtn.disabled = false; }
      showPasteUI(id, share, reliveBtn, "Couldn't decrypt — try pasting the share link.");
    }
  }

  function showPasteUI(id, share, reliveBtn, prefillError = "") {
    if (reliveBtn) { reliveBtn.textContent = "Relive ✦"; reliveBtn.disabled = false; }
    if (document.getElementById(`relive-${id}`)) return;

    const wrap = document.createElement("div");
    wrap.className = "paste-link-wrap relive-row";
    wrap.id = `relive-${id}`;
    wrap.innerHTML = `
      <div class="paste-link-label">Paste your share link to read your notes</div>
      <div class="paste-link-row">
        <input class="paste-link-input" id="paste-input-${esc(id)}" type="text" placeholder="https://…#k=…" />
        <button class="btn-sm" data-paste-submit="${esc(id)}">Decrypt</button>
      </div>
      <div class="paste-link-error" id="paste-err-${esc(id)}">${prefillError}</div>
    `;
    const card = reliveBtn?.closest(".share-card");
    if (card) card.after(wrap);
    document.getElementById(`paste-input-${id}`)?.focus();
  }

  // AES-GCM output is base64: long, no spaces, only A-Za-z0-9+/= chars.
  // Real names and song titles are short or contain spaces.
  function looksEncrypted(s) {
    return typeof s === "string" &&
      s.length > 30 &&
      !/\s/.test(s) &&
      /[+\/=]/.test(s) &&
      /^[A-Za-z0-9+\/=]+$/.test(s);
  }
  function safeDisplay(s, fallback) {
    return (s && !looksEncrypted(s)) ? esc(s) : fallback;
  }

  function formatTimestamp(seconds) {
    if (seconds == null || isNaN(seconds)) return "";
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}:${s.toString().padStart(2, "0")}`;
  }

  function renderSent() {
    if (sentShares.length === 0) {
      return `<div class="empty-state sent-empty">
        <div class="empty-icon">♪</div>
        <div class="empty-title">No notes sent yet</div>
        <div class="empty-sub">Your shared moments will appear here as soon as you send one.</div>
      </div>`;
    }

    const total = sentShares.length;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    sentPage = Math.max(0, Math.min(sentPage, totalPages - 1));
    const pageShares = sentShares.slice(sentPage * PAGE_SIZE, (sentPage + 1) * PAGE_SIZE);

    const cards = pageShares.map(share => {
      const anns = share.annotations || [];
      const noteCount = anns.length;
      const isPlaylist = share.share_type === "playlist";
      const rawTitle  = anns[0]?.track_title || "";
      const rawArtist = anns[0]?.track_artist || "";
      const trackTitle  = safeDisplay(rawTitle,  isPlaylist ? "Playlist share" : "Untitled note");
      const trackArtist = safeDisplay(rawArtist, "");
      const recipient   = safeDisplay(share.recipient_name, "someone special");
      const noteLabel = noteCount === 1 ? "1 note inside" : `${noteCount} notes inside`;
      const dateStr = new Date(share.created_at).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
      const canRelive = !!share.sender_content;

      return `
        <div class="share-card" data-share-id="${esc(share.id)}">
          <div class="share-label">For ${recipient}</div>
          <div class="share-body">
            <div class="share-track">${trackTitle}</div>
            ${trackArtist ? `<div class="share-artist">${trackArtist}</div>` : ""}
          </div>
          <div class="share-footer">
            <div class="share-meta">
              <div class="share-date">${dateStr}</div>
              <div class="share-note-count">${noteLabel}</div>
            </div>
            <div class="share-actions">
              <button class="btn-sm btn-sm-outline" data-copy="${esc(share.id)}">Link</button>
              ${canRelive ? `<button class="btn-sm" data-relive="${esc(share.id)}">Relive ✦</button>` : ""}
            </div>
          </div>
        </div>
      `;
    }).join("");

    const pagination = totalPages > 1 ? `
      <div class="pagination">
        <button class="page-btn" data-prev ${sentPage === 0 ? "disabled" : ""}>← Prev</button>
        <span class="page-info">${sentPage + 1} of ${totalPages}</span>
        <button class="page-btn" data-next ${sentPage >= totalPages - 1 ? "disabled" : ""}>Next →</button>
      </div>` : "";

    return `<div class="shares-grid shares-list sent-list">${cards}</div>${pagination}`;
  }

  function renderReceived() {
    if (!hasReceivedTable) {
      return `
        <div class="notice-card">
          <div class="notice-eyebrow">Coming soon</div>
          <div class="notice-title">Your received notes will live here</div>
          <div class="notice-body">When someone sends you a Keepsake link and you import it in the extension while signed in, it'll be saved here — always accessible, even after the link is gone.</div>
          <div class="notice-sub">Needs a one-time setup in Supabase to activate.</div>
        </div>
        <div class="notice-card" style="background: url('faq-bg-olive.png') center/cover no-repeat; color: #363614;">
          <div class="notice-eyebrow">How it'll work</div>
          <div class="notice-steps">
            1. Someone sends you a Keepsake link<br>
            2. You open it in the extension while signed in<br>
            3. It saves here automatically — all your received notes in one place
          </div>
        </div>
      `;
    }

    if (receivedItems.length === 0) {
      return `<div class="empty-state received-empty">
        <div class="empty-icon">✉</div>
        <div class="empty-title">Nothing received yet</div>
        <div class="empty-sub">Import a share link in the extension while signed in and it'll appear here.</div>
      </div>`;
    }

    const total = receivedItems.length;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    receivedPage = Math.max(0, Math.min(receivedPage, totalPages - 1));
    const pageItems = receivedItems.slice(receivedPage * PAGE_SIZE, (receivedPage + 1) * PAGE_SIZE);

    const cards = pageItems.map(item => {
      const share = item.shares;
      if (!share) return "";
      const anns = share.annotations || [];
      const noteCount = anns.length;
      const isPlaylist = share.share_type === "playlist";
      const trackTitle  = safeDisplay(anns[0]?.track_title,  isPlaylist ? "Playlist share" : "Untitled note");
      const trackArtist = safeDisplay(anns[0]?.track_artist, "");
      const senderName  = safeDisplay(share.sender_name, "someone");
      const noteLabel = noteCount === 1 ? "1 note inside" : `${noteCount} notes inside`;
      const dateStr = new Date(item.imported_at).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });

      return `
        <div class="share-card">
          <div class="share-label">From ${senderName}</div>
          <div class="share-body">
            ${isPlaylist ? `<div class="share-type-pill">Playlist · ${noteCount}</div>` : ""}
            <div class="share-track">${trackTitle}</div>
            ${trackArtist ? `<div class="share-artist">${trackArtist}</div>` : ""}
          </div>
          <div class="share-footer">
            <div class="share-meta">
              <div class="share-date">${dateStr}</div>
              <div class="share-note-count">${noteLabel}</div>
            </div>
          </div>
        </div>
      `;
    }).join("");

    const pagination = totalPages > 1 ? `
      <div class="pagination">
        <button class="page-btn" data-prev ${receivedPage === 0 ? "disabled" : ""}>← Prev</button>
        <span class="page-info">${receivedPage + 1} of ${totalPages}</span>
        <button class="page-btn" data-next ${receivedPage >= totalPages - 1 ? "disabled" : ""}>Next →</button>
      </div>` : "";

    return `<div class="shares-grid shares-list received-list">${cards}</div>${pagination}`;
  }
</script>
</body>
