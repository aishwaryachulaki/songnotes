<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>My Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@500;600;700&display=swap" />
  <style>
    :root {
      --rose:      #D96B7C;
      --tangerine: #F08C21;
      --cream:     #FFFBF4;
      --bg:        #F4D9A6;
      --ink:       #3A2E2A;
      --ink-mid:   #6B5A52;
      --ink-lt:    #A08878;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg) url('background.png') center / cover no-repeat fixed;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
    }

    .page {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    /* ── Nav ── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 0 10px;
    }
    .nav-logo {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400; font-size: 26px;
      color: var(--rose); text-decoration: none; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 5px;
      text-shadow: 0 1px 12px rgba(140,50,60,0.13);
    }
    .nav-logo .logo-spark {
      font-style: normal; font-family: sans-serif;
      font-size: 11px; color: var(--tangerine); font-weight: 400;
      vertical-align: super; line-height: 0;
    }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-mid);
      text-decoration: none; opacity: 0.65; transition: opacity 0.15s;
    }
    .nav-link:hover { opacity: 1; }
    .nav-link.active { opacity: 1; color: var(--rose); }
    .btn-signout {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 20px;
      background: rgba(217,107,124,0.10);
      border: 1.5px solid rgba(217,107,124,0.30);
      color: var(--rose); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-signout:hover { background: rgba(217,107,124,0.18); }

    /* ── Section header ── */
    .section-header { display: flex; align-items: center; gap: 10px; }
    .section-header span {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--rose); white-space: nowrap;
      opacity: 0.75;
    }
    .section-header::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(217,107,124,0.22);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1.5px solid rgba(58,36,24,0.10);
    }
    .tab {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: 0.10em;
      text-transform: uppercase; padding: 8px 20px 10px;
      border: none; background: none; cursor: pointer;
      color: var(--ink-lt);
      border-bottom: 2px solid transparent;
      margin-bottom: -1.5px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--rose); border-bottom-color: var(--rose); }
    .tab:hover:not(.active) { color: var(--ink-mid); }

    /* ── Share grid ── */
    .shares-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 400px)  { .shares-grid { grid-template-columns: 1fr; } }
    @media (max-width: 600px)  { .page { padding: 0 20px 60px; } }

    .share-card {
      border-radius: 16px;
      padding: 20px 20px 16px;
      position: relative; overflow: hidden;
      transition: filter 0.15s;
      display: flex; flex-direction: column;
      aspect-ratio: 1;
      cursor: default;
    }
    .share-card:hover { filter: brightness(0.97); }

    /* Sent tab colours */
    .sent-list .share-card:nth-child(3n+1) { background: url('faq-bg-yellow.png') center / cover no-repeat; color: #4a3800; }
    .sent-list .share-card:nth-child(3n+2) { background: url('faq-bg-pink.png') center / cover no-repeat; color: #5c2d2d; }
    .sent-list .share-card:nth-child(3n+3) { background: url('faq-bg-olive.png')  center / cover no-repeat; color: #363614; }

    /* Received tab colours */
    .received-list .share-card:nth-child(3n+1) { background: url('faq-bg-pink.png') center / cover no-repeat; color: #5c2d2d; }
    .received-list .share-card:nth-child(3n+2) { background: url('faq-bg-olive.png')  center / cover no-repeat; color: #363614; }
    .received-list .share-card:nth-child(3n+3) { background: url('faq-bg-yellow.png') center / cover no-repeat; color: #4a3800; }

    /* Floral illustration — right zone, stem runs toward bottom buttons */
    .share-card::before {
      content: '';
      position: absolute;
      right: calc(-3% + 10px);
      top: 10%;
      width: 40%;
      height: 92%;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: top center;
      opacity: 0.13;
      pointer-events: none;
    }
    /* Yellow cards → sunflower */
    .sent-list .share-card:nth-child(3n+1)::before,
    .received-list .share-card:nth-child(3n+3)::before { background-image: url('sunflower.png'); }
    /* Pink cards → rose (nudged 5px further left than yellow) */
    .sent-list .share-card:nth-child(3n+2)::before,
    .received-list .share-card:nth-child(3n+1)::before { background-image: url('rose2.png'); right: calc(-3% + 15px); top: calc(10% + 3px); }
    /* Olive cards → marigold (nudged 5px further left than yellow) */
    .sent-list .share-card:nth-child(3n+3)::before,
    .received-list .share-card:nth-child(3n+2)::before { background-image: url('marigold.png'); right: calc(-3% + 15px); }

    /* ✦ top-right */
    .share-card::after {
      content: '✦';
      position: absolute; right: 16px; top: 16px;
      font-size: 16px; opacity: 0.18; pointer-events: none;
    }

    /* Top row: "For name" */
    .share-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 700; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--rose);
      padding-right: 24px; /* clear the ✦ */
      margin-bottom: 12px;
      max-width: 58%; /* stay in left content zone */
    }

    /* Body: title + artist sit just below the label, flex:1 pushes footer to bottom */
    .share-body { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }

    .share-type-pill {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 7.5px; font-weight: 700; letter-spacing: 0.10em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 8px;
      background: rgba(217,107,124,0.12); color: var(--rose);
      margin-bottom: 8px; align-self: flex-start;
    }
    .share-track {
      font-family: 'Lora', Georgia, serif;
      font-size: 17px; font-weight: 700; line-height: 1.3;
      margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
      max-width: 58%; /* stay in left content zone, clear of illustration */
    }
    .share-artist {
      font-size: 12px; opacity: 0.52;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Bottom row: meta (date + notes stacked) + action button */
    .share-footer {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-top: 14px; gap: 8px;
    }
    .share-meta { display: flex; flex-direction: column; gap: 3px; }
    .share-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; letter-spacing: 0.03em; opacity: 0.45;
    }
    .share-note-count {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; letter-spacing: 0.03em; opacity: 0.45;
    }
    .share-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 5px 12px; border-radius: 20px;
      background: rgba(217,107,124,0.12);
      border: 1.5px solid rgba(217,107,124,0.30);
      color: var(--rose); cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    .btn-sm:hover { background: rgba(217,107,124,0.20); }
    .btn-sm-outline {
      background: transparent;
      border-color: rgba(58,36,24,0.20);
      color: inherit;
      opacity: 0.55;
    }
    .btn-sm-outline:hover { background: rgba(58,36,24,0.06); opacity: 0.9; }

    /* ── Select-to-delete mode ── */
    .select-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin: -2px 0 -6px; }
    .select-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      background: none; border: none; cursor: pointer; padding: 4px 2px;
      color: var(--ink-lt); transition: color 0.15s;
    }
    .select-link:hover { color: var(--rose); }
    .select-del {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(181,72,72,0.10); border: 1.5px solid rgba(181,72,72,0.35);
      color: #b54848; cursor: pointer; padding: 5px 14px; border-radius: 20px;
      transition: background 0.15s;
    }
    .select-del:hover { background: rgba(181,72,72,0.18); }
    /* In select mode: cards become pickable; hide the corner ✦ for the check */
    .share-card.selectable { cursor: pointer; }
    .selecting .share-card::after { display: none; }
    .share-card.selected { outline: 2.5px solid var(--rose); outline-offset: -3px; }
    .select-check {
      position: absolute; top: 14px; right: 14px;
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid var(--rose); background: rgba(255,255,255,0.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: transparent;
      pointer-events: none; z-index: 2;
    }
    .share-card.selected .select-check { background: var(--rose); color: #fff; }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 4px;
    }
    .page-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.10em;
      text-transform: uppercase; padding: 6px 16px; border-radius: 20px;
      background: rgba(217,107,124,0.10);
      border: 1.5px solid rgba(217,107,124,0.25);
      color: var(--rose); cursor: pointer; transition: background 0.15s;
    }
    .page-btn:hover:not(:disabled) { background: rgba(217,107,124,0.18); }
    .page-btn:disabled { opacity: 0.30; cursor: default; }
    .page-info {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; letter-spacing: 0.06em; color: var(--ink-lt); opacity: 0.7;
    }

    /* Ghost placeholder cards — same grid, muted appearance */
    .share-card--ghost { opacity: 0; pointer-events: none; }
    .share-card--ghost-msg {
      opacity: 1;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .share-card--ghost-msg .ghost-title {
      font-family: 'Lora', Georgia, serif; font-size: 16px; font-weight: 700; margin-bottom: 6px;
    }
    .share-card--ghost-msg .ghost-sub {
      font-family: 'Spectral', Georgia, serif; font-style: italic; font-size: 12px; opacity: 0.7; line-height: 1.5;
    }

    /* ── Notice (received not set up yet) ── */
    .notice-card {
      border-radius: 14px; padding: 26px 26px 24px;
      position: relative; overflow: hidden;
    }
    .notice-card:nth-child(1) { background: url('faq-bg-pink.png') top / cover no-repeat; color: #5c2d2d; }
    .notice-card:nth-child(2) { background: url('faq-bg-olive.png') center / cover no-repeat; color: #363614; margin-top: 0; }
    .notice-card::after {
      content: '✦'; position: absolute; right: 22px; top: 18px;
      font-size: 26px; opacity: 0.09; pointer-events: none;
    }
    .notice-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 10px;
    }
    .notice-title { font-family: 'Lora', Georgia, serif; font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .notice-body { font-size: 13.5px; line-height: 1.65; opacity: 0.72; margin-bottom: 12px; }
    .notice-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 13px; color: var(--rose); opacity: 0.85;
    }
    .notice-steps { font-size: 13.5px; line-height: 1.85; opacity: 0.72; }

    /* ── First-run onboarding cue ── */
    .onboard-card {
      position: relative; overflow: hidden;
      background: url('faq-bg-yellow.png') center / cover no-repeat; color: #4a3800;
      border-radius: 16px; padding: 22px 24px 20px; margin-bottom: 22px;
      border: 1px solid rgba(74,56,0,0.12);
    }
    .onboard-x {
      position: absolute; top: 12px; right: 12px;
      width: 26px; height: 26px; border-radius: 50%;
      border: none; background: rgba(74,56,0,0.08); color: #4a3800;
      font-size: 13px; cursor: pointer; line-height: 1;
    }
    .onboard-x:hover { background: rgba(74,56,0,0.16); }
    .onboard-eyebrow {
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: #b25c00; margin-bottom: 8px;
    }
    .onboard-title { font-family: 'Lora', Georgia, serif; font-size: 19px; font-weight: 700; margin-bottom: 14px; }
    .onboard-steps { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 14px; }
    .onboard-steps li { display: flex; gap: 12px; align-items: flex-start; font-size: 14px; line-height: 1.55; }
    .onboard-n {
      flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
      background: rgba(74,56,0,0.10); border: 1.5px solid rgba(74,56,0,0.30);
      color: #4a3800; font-family: 'Lora', Georgia, serif; font-weight: 700; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .onboard-btn {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
      padding: 8px 15px; border-radius: 50px;
      font-family: 'Montserrat', sans-serif; font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none;
      color: #fff; background: var(--rose); box-shadow: 0 4px 12px rgba(217,107,124,0.30);
    }
    .onboard-btn:hover { filter: brightness(1.05); }
    .onboard-hint {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 8px;
      padding: 6px 10px 6px 6px; border-radius: 10px;
      background: rgba(74,56,0,0.06); border: 1px solid rgba(74,56,0,0.14);
    }
    .onboard-hint img { width: 24px; height: 24px; border-radius: 5px; display: block; }
    .onboard-hint span { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; color: #4a3800; line-height: 1.35; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: var(--cream);
      font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 0.04em;
      padding: 9px 20px; border-radius: 20px;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
      white-space: nowrap; z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* ── Loading / error ── */
    @keyframes ks-breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    .state {
      text-align: center; padding: 80px 20px;
      color: var(--ink-mid); font-size: 14px; line-height: 1.6;
    }
    .state strong {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400;
      display: block; font-size: 32px; color: var(--rose);
      margin-bottom: 8px;
      animation: ks-breathe 2s ease-in-out infinite;
    }


    /* ── Footer ── */
    .footer-links {
      margin-top: auto;
      padding-top: 32px;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; color: var(--ink-lt); letter-spacing: 0.04em;
      opacity: 0.7;
    }
    .footer-links a { color: var(--ink-lt); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="page" id="page">
  <div class="state"><strong>loading…</strong></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1/dist/umd/supabase.js" integrity="sha384-EjUdIVmzWliPzdzhxZ9ZoO0etXLKWuUPUftAGxP6qH6Lm4oLwoLaJR0Ba4pIDiDL" crossorigin="anonymous"></script>
<script>
  const SUPABASE_URL = "https://kkasgbkgwjxiutdalbbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYXNnYmtnd2p4aXV0ZGFsYmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjU3OTQsImV4cCI6MjA5Mjg0MTc5NH0.z1JLMTzz3X_swbWHdt2z4UDKyUwjEfNYys5kdDMq3R4";

  // ── Crypto helpers (mirrors popup.js) ──
  async function importEncKey(b64) {
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    return crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, false, ["decrypt"]);
  }
  async function decryptField(b64, key) {
    if (!b64) return null;
    try {
      const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: buf.slice(0, 12) }, key, buf.slice(12));
      return new TextDecoder().decode(dec);
    } catch { return null; }
  }

  // ── Extension detection + first-run onboarding cue ──
  let extensionPresent = false;
  let onboardingSeen = null;  // null = unknown; true/false reported by the bridge
  let pageLoaded = false;     // true once loadAll() has rendered at least once
  window.addEventListener("keepsake:extension_present", () => {
    extensionPresent = true;
    if (pageLoaded) render();
  }, { once: true });
  // Only the bridge dispatches this, so receiving it also confirms the extension.
  window.addEventListener("keepsake:onboarding_state", (e) => {
    extensionPresent = true;
    onboardingSeen = e.detail ? !!e.detail.seen : null;
    if (pageLoaded) render();
  });
  // Show the welcome cue only when the extension is here AND the tour isn't done.
  function onboardingModule() {
    if (!extensionPresent || onboardingSeen !== false) return "";
    return `
      <div class="onboard-card" id="onboardCard">
        <button class="onboard-x" id="onboardDismiss" aria-label="Dismiss">✕</button>
        <div class="onboard-eyebrow">✦ New here?</div>
        <div class="onboard-title">Make your first keepsake</div>
        <ol class="onboard-steps">
          <li><span class="onboard-n">1</span>
            <div>Open the Spotify Web Player and play any song.<br>
              <a class="onboard-btn" href="https://open.spotify.com" target="_blank" rel="noopener">Open Spotify Web Player →</a>
            </div>
          </li>
          <li><span class="onboard-n">2</span>
            <div>Click the Keepsake <span style="color:var(--tangerine)">✦</span> icon in your toolbar to open the side panel — a guided tour pops up as the song plays.
              <span class="onboard-hint"><img src="icon48.png" alt="Keepsake icon" /><span>Pin it &amp; click it —<br>top-right of your browser</span></span>
            </div>
          </li>
        </ol>
      </div>
    `;
  }

  // Ask the extension for a share's enc_key. Resolves with:
  //   { responded, encKey }
  // - responded:false  → the extension never answered (not installed/enabled here)
  // - responded:true, encKey:null → extension is here but doesn't hold this key
  //   (the letter was created on another device / local storage was cleared)
  // - responded:true, encKey:"…"  → the key, ready to build the link
  function getKeyFromExtension(shareId) {
    return new Promise((resolve) => {
      let done = false;
      const handler = (e) => {
        if (e.detail?.shareId === shareId) {
          done = true;
          window.removeEventListener("keepsake:share_key_response", handler);
          resolve({ responded: true, encKey: e.detail.encKey || null });
        }
      };
      window.addEventListener("keepsake:share_key_response", handler);
      window.dispatchEvent(new CustomEvent("keepsake:get_share_key", { detail: { shareId } }));
      // Wait up to 2s — if present, the content script responds in <50ms.
      setTimeout(() => {
        if (done) return;
        window.removeEventListener("keepsake:share_key_response", handler);
        resolve({ responded: false, encKey: null });
      }, 2000);
    });
  }

  // Ask the extension to enter experience mode ("relive") for one of the user's
  // letters. Resolves { ok, error }. Mirrors getKeyFromExtension's event pattern.
  function reliveInExtension(shareId) {
    return new Promise((resolve) => {
      const handler = (e) => {
        if (e.detail?.shareId === shareId) {
          window.removeEventListener("keepsake:relive_response", handler);
          resolve({ ok: !!e.detail.ok, error: e.detail.error || null });
        }
      };
      window.addEventListener("keepsake:relive_response", handler);
      window.dispatchEvent(new CustomEvent("keepsake:relive", { detail: { shareId } }));
      setTimeout(() => {
        window.removeEventListener("keepsake:relive_response", handler);
        resolve({ ok: false, error: "no_extension" });
      }, 3000);
    });
  }

  // Relive a letter (drive the extension into experience mode), then open Spotify.
  async function doRelive(reliveBtn) {
    const shareId = reliveBtn.dataset.relive;
    const spotify = reliveBtn.dataset.spotify;
    const res = await reliveInExtension(shareId);
    if (!res.ok) {
      if (res.error === "not_on_device") {
        showToast("This letter's key isn't on this device. Relive it from where you sent it.");
      } else {
        showToast("Open the Keepsake extension, then try Relive ✦");
      }
    }
    if (spotify) window.open(spotify, "_blank");
  }

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2400);
  }

  let currentUser = null;
  let sentShares = [];
  let receivedItems = [];
  let hasReceivedTable = false;
  let activeTab = "received";
  let sentPage = 0;
  let receivedPage = 0;
  let selectMode = false;          // sent-tab "select to delete" mode
  let selectedIds = new Set();     // share ids picked for deletion
  const PAGE_SIZE = 16;

  // Read tab from URL hash
  if (location.hash === "#sent") activeTab = "sent";
  else if (location.hash === "#received") activeTab = "received";

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = "auth.html"; return; }
    currentUser = session.user;
    pushSessionToExtension(session);
    await loadAll();
  })();

  // Reliable session sync into the extension. The auth-bridge content script
  // listens on this page; auth.html also dispatches, but a redirect race can
  // drop that one-shot event. Since the user lands and stays here, we re-push
  // every 200ms until the bridge confirms it saved (keepsake:auth_saved), or we
  // give up after ~2s. This is what makes the extension reliably "see" the login.
  function pushSessionToExtension(session) {
    const detail = {
      access_token: session.access_token,
      refresh_token: session.refresh_token,
      expires_at: session.expires_at,
      user: {
        id: session.user.id,
        email: session.user.email,
        name: session.user.user_metadata?.full_name || session.user.email,
        avatar: session.user.user_metadata?.avatar_url || null,
      },
    };
    let synced = false;
    window.addEventListener("keepsake:auth_saved", () => { synced = true; }, { once: true });
    let tries = 0;
    (function push() {
      if (synced || tries++ > 10) return;
      window.dispatchEvent(new CustomEvent("keepsake:auth", { detail }));
      setTimeout(push, 200);
    })();
  }

  async function loadAll() {
    const sentRes = await sb
      .from("shares")
      .select("id, user_id, share_type, playlist_id, playlist_url, playlist_name, sender_name, recipient_name, created_at, annotations(id, track_id, track_title, track_artist, timestamp, playlist_id)")
      // 'note' omitted — encrypted blob, not displayed here
      // explicit columns bypass PostgREST schema cache which silently drops new columns from select(*)
      .order("created_at", { ascending: false });

    sentShares = sentRes.data || [];

    // Load received shares
    const recRes = await sb
      .from("received_shares")
      .select(`id, imported_at, shares(id, share_type, playlist_id, playlist_url, playlist_name, sender_name, recipient_name, created_at, annotations(id, track_id, track_title, track_artist, playlist_id))`)
      .order("imported_at", { ascending: false });

    if (!recRes.error) {
      hasReceivedTable = true;
      receivedItems = recRes.data || [];
    } else {
      hasReceivedTable = recRes.error.code !== "42P01"; // table missing vs other error
      receivedItems = [];
    }

    pageLoaded = true;
    render();
  }

  function render() {
    const page = document.getElementById("page");

    const nav = `
      <div class="nav">
        <a class="nav-logo" href="index.html">keepsake.<span class="logo-spark">✦</span></a>
        <div class="nav-right">
          <a class="nav-link active" href="notes.html">Notes</a>
          <a class="nav-link" href="account.html">Account</a>
          <button class="btn-signout" id="signoutBtn">Sign out</button>
        </div>
      </div>
    `;

    const tabs = `
      <div class="tabs">
        <button class="tab ${activeTab === "received" ? "active" : ""}" data-tab="received">Received</button>
        <button class="tab ${activeTab === "sent" ? "active" : ""}" data-tab="sent">Sent</button>
      </div>
    `;

    const content = activeTab === "sent" ? renderSent() : renderReceived();

    page.innerHTML = `
      ${nav}
      ${onboardingModule()}
      <div class="section-header"><span>Your notes</span></div>
      ${tabs}
      ${content}
      <div class="footer-links">
        <a href="privacy.html" target="_blank">Privacy Policy</a>
        &nbsp;·&nbsp;
        <a href="index.html">Home</a>
      </div>
    `;

    // Onboarding cue dismiss → finish the tour everywhere (bridge marks it seen).
    page.querySelector("#onboardDismiss")?.addEventListener("click", () => {
      onboardingSeen = true;
      window.dispatchEvent(new CustomEvent("keepsake:dismiss_onboarding"));
      render();
    });

    // Tab switching
    page.querySelectorAll(".tab[data-tab]").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        sentPage = 0; receivedPage = 0;
        location.hash = activeTab === "sent" ? "sent" : "";
        render();
      });
    });

    // Pagination
    page.querySelector("[data-prev]")?.addEventListener("click", () => {
      if (activeTab === "sent") sentPage--; else receivedPage--;
      render();
    });
    page.querySelector("[data-next]")?.addEventListener("click", () => {
      if (activeTab === "sent") sentPage++; else receivedPage++;
      render();
    });

    // Sign out
    document.getElementById("signoutBtn").addEventListener("click", async () => {
      await sb.auth.signOut();
      await new Promise(resolve => {
        window.addEventListener("keepsake:signout_done", resolve, { once: true });
        window.dispatchEvent(new CustomEvent("keepsake:signout"));
        setTimeout(resolve, 800);
      });
      window.location.href = "index.html";
    });

    // Silently decrypt any encrypted recipient labels using extension keys
    if (activeTab === "sent") tryDecryptLabels();

    // Received list — relive button
    const receivedList = page.querySelector(".received-list");
    if (receivedList) {
      receivedList.addEventListener("click", (e) => {
        const reliveBtn = e.target.closest("[data-relive]");
        if (!reliveBtn) return;
        doRelive(reliveBtn);
      });
    }

    // Select-to-delete controls
    page.querySelector("[data-select-on]")?.addEventListener("click", () => {
      selectMode = true; selectedIds.clear(); render();
    });
    page.querySelector("[data-select-cancel]")?.addEventListener("click", () => {
      selectMode = false; selectedIds.clear(); render();
    });
    page.querySelector("[data-select-delete]")?.addEventListener("click", async (ev) => {
      if (!selectedIds.size) { selectMode = false; render(); return; }
      const n = selectedIds.size;
      if (!confirm(`Delete ${n} keepsake${n > 1 ? "s" : ""}? This is permanent — any links you've already shared will stop working.`)) return;
      ev.target.disabled = true; ev.target.textContent = "Deleting…";
      const ids = [...selectedIds];
      let failed = 0;
      for (const id of ids) {
        const ok = await deleteShare(id);
        if (ok) {
          sentShares = sentShares.filter((s) => s.id !== id);
          window.dispatchEvent(new CustomEvent("keepsake:remove_share", { detail: { shareId: id } }));
        } else { failed++; }
      }
      selectMode = false; selectedIds.clear(); render();
      showToast(failed ? `Removed ${ids.length - failed}, ${failed} failed.` : "Removed.");
    });

    // Sent list — select / relive / paste-link / decrypt
    const sentList = page.querySelector(".sent-list");
    if (sentList) {
      sentList.addEventListener("click", async (e) => {
        // In select mode, a card click toggles its selection.
        if (selectMode) {
          const card = e.target.closest(".share-card");
          if (!card) return;
          const id = card.dataset.shareId;
          if (selectedIds.has(id)) { selectedIds.delete(id); card.classList.remove("selected"); }
          else { selectedIds.add(id); card.classList.add("selected"); }
          const cnt = document.getElementById("selCount");
          if (cnt) cnt.textContent = String(selectedIds.size);
          return;
        }

        // Copy link
        const copyBtn = e.target.closest("[data-copy]");
        if (copyBtn) {
          const shareId = copyBtn.dataset.copy;
          copyBtn.textContent = "…";
          copyBtn.disabled = true;
          const { responded, encKey } = await getKeyFromExtension(shareId);
          if (encKey) {
            const url = `https://dropakeepsake.com/share.html?id=${shareId}&e=1#k=${encKey}`;
            try {
              await navigator.clipboard.writeText(url);
              showToast("Link copied ✦");
            } catch {
              showToast("Couldn't access clipboard. Try again.");
            }
          } else if (!responded) {
            showToast("Install or enable the Keepsake extension, then refresh to copy links.");
          } else {
            // Extension is here, but the key isn't on this device (and wasn't in
            // the vault when it was last unlocked). Be honest about why.
            showToast("This letter's link key isn't saved on this device. Keys live on the device that created the letter (and in Cross-device relive, if it was on when you sent it) — letters sent before that can't be recovered.");
          }
          copyBtn.textContent = "Link";
          copyBtn.disabled = false;
          return;
        }

        // Relive button — open the song/playlist on Spotify
        const reliveBtn = e.target.closest("[data-relive]");
        if (!reliveBtn) return;
        doRelive(reliveBtn);
      });
    }
  }

  // Delete a keepsake the user owns: annotations + share row (+ its vault key).
  // RLS scopes every delete to the logged-in owner.
  async function deleteShare(shareId) {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return false;
      await sb.from("annotations").delete().eq("share_id", shareId);
      await sb.from("vault_keys").delete().eq("share_id", shareId);
      const { error } = await sb.from("shares").delete().eq("id", shareId);
      return !error;
    } catch {
      return false;
    }
  }

  // After rendering, quietly decrypt any encrypted recipient names via the extension
  async function tryDecryptLabels() {
    const toDecrypt = sentShares.filter(s => looksEncrypted(s.recipient_name));
    for (const share of toDecrypt) {
      const { encKey } = await getKeyFromExtension(share.id);
      if (!encKey) continue;
      try {
        const cryptoKey = await importEncKey(encKey);
        const name = await decryptField(share.recipient_name, cryptoKey);
        if (!name) continue;
        // Update the label on the rendered card
        const card = document.querySelector(`[data-relive="${share.id}"]`)?.closest(".share-card");
        if (card) {
          const label = card.querySelector(".share-label");
          if (label) label.textContent = `For ${name}`;
        }
        // Cache it so Relive can also show it
        share._decryptedRecipient = name;
      } catch { /* leave as fallback */ }
    }
  }

  // Build the Spotify URL for a share (track or playlist)
  function spotifyUrl(share) {
    const anns = share.annotations || [];
    const rawId = anns[0]?.track_id || "";
    if (!rawId) return "https://open.spotify.com";
    // Normalize "spotify:track:ID" → bare ID
    const id = rawId.includes(":") ? rawId.split(":").pop() : rawId;
    if (share.share_type === "playlist" && share.playlist_id) {
      const pid = share.playlist_id.includes(":") ? share.playlist_id.split(":").pop() : share.playlist_id;
      return `https://open.spotify.com/playlist/${pid}`;
    }
    return `https://open.spotify.com/track/${id}`;
  }

  // AES-GCM output is base64: long, no spaces, only A-Za-z0-9+/= chars.
  // Real names and song titles are short or contain spaces.
  function looksEncrypted(s) {
    return typeof s === "string" &&
      s.length > 30 &&
      !/\s/.test(s) &&
      /[+\/=]/.test(s) &&
      /^[A-Za-z0-9+\/=]+$/.test(s);
  }
  function safeDisplay(s, fallback) {
    return (s && !looksEncrypted(s)) ? esc(s) : fallback;
  }

  function renderSent() {
    if (sentShares.length === 0) {
      return `<div class="shares-grid shares-list sent-list">
        <div class="share-card share-card--ghost-msg">
          <div class="ghost-title">Nothing sent yet</div>
          <div class="ghost-sub">Write a note in the extension and share it — your sent keepsakes will appear here.</div>
        </div>
        <div class="share-card share-card--ghost"></div>
        <div class="share-card share-card--ghost"></div>
        <div class="share-card share-card--ghost"></div>
      </div>`;
    }

    const total = sentShares.length;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    sentPage = Math.max(0, Math.min(sentPage, totalPages - 1));
    const pageShares = sentShares.slice(sentPage * PAGE_SIZE, (sentPage + 1) * PAGE_SIZE);

    const cards = pageShares.map(share => {
      const anns = share.annotations || [];
      const noteCount = anns.length;

      // Detect playlist via cascade — share_type is reliable for new shares; for old
      // shares (where shares row columns are null) fall back to annotation-level playlist_id
      // which pushNote() always wrote, then to unique track count as last resort.
      const trackIdSet = new Set(anns.map(a => a.track_id).filter(Boolean));
      const annotationPlaylistId = anns.find(a => a.playlist_id)?.playlist_id ?? null;
      const isPlaylist = share.share_type === "playlist"
        || !!(share.playlist_url || share.playlist_id)
        || !!share.playlist_name
        || !!annotationPlaylistId
        || trackIdSet.size > 1;

      // Display title: for playlists use the stored name; for single tracks use the track title
      const displayTitle  = isPlaylist
        ? safeDisplay(share.playlist_name, "Playlist share")
        : safeDisplay(anns[0]?.track_title, "Untitled note");
      const displayArtist = isPlaylist ? "" : safeDisplay(anns[0]?.track_artist, "");
      const recipient     = safeDisplay(share.recipient_name, "someone special");
      const noteLabel = noteCount === 1 ? "1 note inside" : `${noteCount} notes inside`;
      const dateStr = new Date(share.created_at).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
      const spotify = spotifyUrl(share);
      const canRelive = spotify !== "https://open.spotify.com";

      const sel = selectMode;
      const isSel = selectedIds.has(share.id);
      return `
        <div class="share-card ${sel ? "selectable" : ""} ${isSel ? "selected" : ""}" data-share-id="${esc(share.id)}">
          ${sel ? `<div class="select-check" aria-hidden="true">✓</div>` : ""}
          <div class="share-label">For ${recipient}</div>
          <div class="share-body">
            <div class="share-track">${displayTitle}</div>
            ${displayArtist ? `<div class="share-artist">${displayArtist}</div>` : ""}
          </div>
          <div class="share-footer">
            <div class="share-meta">
              <div class="share-date">${dateStr}</div>
              <div class="share-note-count">${noteLabel}</div>
            </div>
            ${sel ? "" : `<div class="share-actions">
              <button class="btn-sm btn-sm-outline" data-copy="${esc(share.id)}">Link</button>
              ${canRelive ? `<button class="btn-sm" data-relive="${esc(share.id)}" data-spotify="${esc(spotify)}">Relive ✦</button>` : ""}
            </div>`}
          </div>
        </div>
      `;
    }).join("");

    const pagination = totalPages > 1 ? `
      <div class="pagination">
        <button class="page-btn" data-prev ${sentPage === 0 ? "disabled" : ""}>← Prev</button>
        <span class="page-info">${sentPage + 1} of ${totalPages}</span>
        <button class="page-btn" data-next ${sentPage >= totalPages - 1 ? "disabled" : ""}>Next →</button>
      </div>` : "";

    const toolbar = selectMode
      ? `<div class="select-bar select-bar--active">
           <button class="select-link" data-select-cancel>Cancel</button>
           <button class="select-del" data-select-delete>Delete <span id="selCount">${selectedIds.size}</span></button>
         </div>`
      : `<div class="select-bar"><button class="select-link" data-select-on>Select to delete</button></div>`;
    return `${toolbar}<div class="shares-grid shares-list sent-list ${selectMode ? "selecting" : ""}">${cards}</div>${pagination}`;
  }

  function renderReceived() {
    if (!hasReceivedTable) {
      return `
        <div class="notice-card">
          <div class="notice-eyebrow">Coming soon</div>
          <div class="notice-title">Your received notes will live here</div>
          <div class="notice-body">When someone sends you a Keepsake link and you import it in the extension while signed in, it'll be saved here, always accessible, even after the link is gone.</div>
          <div class="notice-sub">Needs a one-time setup in Supabase to activate.</div>
        </div>
        <div class="notice-card" style="background: url('faq-bg-olive.png') center/cover no-repeat; color: #363614;">
          <div class="notice-eyebrow">How it'll work</div>
          <div class="notice-steps">
            1. Someone sends you a Keepsake link<br>
            2. You open it in the extension while signed in<br>
            3. It saves here automatically, all your received notes in one place
          </div>
        </div>
      `;
    }

    if (receivedItems.length === 0) {
      return `<div class="shares-grid shares-list received-list">
        <div class="share-card share-card--ghost-msg">
          <div class="ghost-title">Nothing received yet</div>
          <div class="ghost-sub">Import a share link in the extension while signed in and it'll appear here.</div>
        </div>
        <div class="share-card share-card--ghost"></div>
        <div class="share-card share-card--ghost"></div>
        <div class="share-card share-card--ghost"></div>
      </div>`;
    }

    const total = receivedItems.length;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    receivedPage = Math.max(0, Math.min(receivedPage, totalPages - 1));
    const pageItems = receivedItems.slice(receivedPage * PAGE_SIZE, (receivedPage + 1) * PAGE_SIZE);

    const cards = pageItems.map(item => {
      const share = item.shares;
      if (!share) return "";
      const anns = share.annotations || [];
      const noteCount = anns.length;

      const trackIdSet2 = new Set(anns.map(a => a.track_id).filter(Boolean));
      const annPlaylistId2 = anns.find(a => a.playlist_id)?.playlist_id ?? null;
      const isPlaylist = share.share_type === "playlist"
        || !!(share.playlist_url || share.playlist_id)
        || !!share.playlist_name
        || !!annPlaylistId2
        || trackIdSet2.size > 1;

      const trackTitle  = isPlaylist
        ? safeDisplay(share.playlist_name, "Playlist share")
        : safeDisplay(anns[0]?.track_title, "Untitled note");
      const trackArtist = isPlaylist ? "" : safeDisplay(anns[0]?.track_artist, "");
      const senderName  = safeDisplay(share.sender_name, "someone");
      const noteLabel = noteCount === 1 ? "1 note inside" : `${noteCount} notes inside`;
      const dateStr = new Date(item.imported_at).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
      const spotify = spotifyUrl(share);
      const canRelive = spotify !== "https://open.spotify.com";

      return `
        <div class="share-card">
          <div class="share-label">From ${senderName}</div>
          <div class="share-body">
            <div class="share-track">${trackTitle}</div>
            ${trackArtist ? `<div class="share-artist">${trackArtist}</div>` : ""}
          </div>
          <div class="share-footer">
            <div class="share-meta">
              <div class="share-date">${dateStr}</div>
              <div class="share-note-count">${noteLabel}</div>
            </div>
            <div class="share-actions">
              ${canRelive ? `<button class="btn-sm" data-relive="${esc(share.id)}" data-spotify="${esc(spotify)}">Relive ✦</button>` : ""}
            </div>
          </div>
        </div>
      `;
    }).join("");

    const pagination = totalPages > 1 ? `
      <div class="pagination">
        <button class="page-btn" data-prev ${receivedPage === 0 ? "disabled" : ""}>← Prev</button>
        <span class="page-info">${receivedPage + 1} of ${totalPages}</span>
        <button class="page-btn" data-next ${receivedPage >= totalPages - 1 ? "disabled" : ""}>Next →</button>
      </div>` : "";

    return `<div class="shares-grid shares-list received-list">${cards}</div>${pagination}`;
  }
</script>
</body>
</html>
