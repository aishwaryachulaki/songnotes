<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keepsake — My Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@500;600;700&display=swap" />
  <style>
    :root {
      --rose:      #D96B7C;
      --tangerine: #F08C21;
      --cream:     #FFFBF4;
      --bg:        #F4D9A6;
      --ink:       #3A2E2A;
      --ink-mid:   #6B5A52;
      --ink-lt:    #A08878;
      --border:    rgba(58,36,24,0.09);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg) url('background.png') center / cover no-repeat fixed;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      color: var(--ink);
      position: relative;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 600px) { .page { padding: 0 20px 60px; } }

    /* ── Nav ── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 0 10px;
    }
    .nav-logo {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400; font-size: 26px;
      color: var(--rose); text-decoration: none; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 5px;
      text-shadow: 0 1px 12px rgba(140,50,60,0.13);
    }
    .nav-logo .logo-spark {
      font-style: normal; font-family: sans-serif;
      font-size: 11px; color: var(--tangerine); font-weight: 400;
      vertical-align: super; line-height: 0;
    }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-email {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; color: var(--ink-mid); letter-spacing: 0.03em;
      opacity: 0.7;
    }
    .nav-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-mid);
      text-decoration: none; opacity: 0.65; transition: opacity 0.15s;
    }
    .nav-link:hover { opacity: 1; }
    .nav-link.active { opacity: 1; color: var(--rose); }
    .btn-signout {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 20px;
      background: rgba(217,107,124,0.10);
      border: 1.5px solid rgba(217,107,124,0.30);
      color: var(--rose); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-signout:hover { background: rgba(217,107,124,0.18); }

    /* ── Hero credits card ── */
    .hero-card {
      background: #f0dfa0 url('faq-bg-yellow.png') top / cover no-repeat;
      border-radius: 18px; padding: 28px 32px;
      position: relative; overflow: hidden; min-height: 170px;
      color: #4a3800;
      box-shadow: inset 0 0 0 1px rgba(240,223,160,0.6);
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 12px;
    }
    .hero-number {
      font-family: 'Lora', Georgia, serif;
      font-size: 72px; font-weight: 700;
      line-height: 1; margin-bottom: 12px;
    }
    .hero-status { font-size: 12.5px; line-height: 1.55; margin-bottom: 8px; opacity: 0.75; }
    .hero-cta {
      font-family: 'Spectral', Georgia, serif;
      font-size: 13px; color: var(--rose); font-style: italic;
      background: none; border: none; padding: 0; cursor: pointer;
    }
    .hero-cta:hover { text-decoration: underline; }

    /* ── Tagline ── */
    .tagline { text-align: center; padding: 6px 0 2px; }
    .tagline-sparkle { font-size: 11px; color: var(--rose); opacity: 0.45; margin-bottom: 8px; }
    .tagline-main {
      font-family: 'Lora', Georgia, serif;
      font-size: 14px; color: var(--ink-mid); line-height: 1.6;
    }
    .tagline-sub {
      font-family: 'Spectral', Georgia, serif;
      font-size: 14px; color: var(--rose); font-style: italic; margin-top: 3px;
      opacity: 0.82;
    }

    /* ── Section header ── */
    .section-header { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    .section-header span {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--rose); white-space: nowrap;
      opacity: 0.75;
    }
    .section-header::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(217,107,124,0.22);
    }

    /* ── Pricing grid ── */
    .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .bundle:nth-child(1),
    .bundle:nth-child(2),
    .bundle:nth-child(3) { background: #f0e8dc url('lifetime-background.png') top / cover no-repeat; color: #3a2418; border: 1.5px solid rgba(217,107,124,0.45); box-shadow: inset 0 0 0 1px rgba(240,232,220,0.6); }
    .bundle {
      border-radius: 14px; padding: 20px 18px 18px;
      display: flex; flex-direction: column; gap: 8px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: filter 0.15s;
    }
    .bundle:hover { filter: brightness(0.96); }
    .bundle-sparkles {
      position: absolute; top: 12px; right: 12px;
      width: 28px; height: 28px;
      background: url('credits-sparkles.png') center / contain no-repeat;
      pointer-events: none; opacity: 0.75;
    }
    .bundle-top { display: flex; flex-direction: column; gap: 4px; }
    .bundle-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 600;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--rose);
    }
    .bundle-count {
      font-family: 'Lora', Georgia, serif;
      font-size: 26px; font-weight: 400; line-height: 1.1;
    }
    .bundle-bottom { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .bundle-rule { border: none; border-top: 1px solid rgba(58,36,24,0.10); margin-bottom: 2px; }
    .bundle-price {
      font-family: 'Lora', Georgia, serif;
      font-size: 22px; font-weight: 600; color: var(--rose);
    }
    .bundle-desc { font-size: 10px; line-height: 1.4; opacity: 0.65; }

    /* ── Lifetime card ── */
    .lifetime-card {
      background: #f0c0c8 url('faq-bg-pink.png') top / cover no-repeat;
      box-shadow: inset 0 0 0 1px rgba(240,192,200,0.6);
      border-radius: 14px; padding: 20px 24px;
      position: relative; overflow: hidden;
      cursor: pointer; transition: filter 0.15s;
      color: #5c2d2d;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .lifetime-card:hover { filter: brightness(0.97); }
    .lifetime-content { position: relative; z-index: 1; flex: 1; }
    .lifetime-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 17px; font-weight: 400;
      line-height: 1.2; margin-bottom: 2px;
      color: #5c2d2d;
    }
    .lifetime-sub {
      font-family: 'Spectral', Georgia, serif;
      font-size: 13px; color: var(--rose); font-style: italic;
    }
    .lifetime-rule { display: none; }
    .lifetime-price-row {
      display: flex; flex-direction: column; align-items: flex-end;
      flex-shrink: 0; gap: 2px;
    }
    .lifetime-price {
      font-family: 'Lora', Georgia, serif;
      font-size: 24px; font-weight: 500; line-height: 1; color: var(--rose);
    }
    .lifetime-desc { font-size: 10px; line-height: 1.4; opacity: 0.65; text-align: right; color: #5c2d2d; }

    /* ── Trust line ── */
    .trust-line {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10.5px; color: var(--ink-lt); letter-spacing: 0.03em;
    }

    /* ── Purchase history ── */
    .history-card {
      background: #d4d898 url('faq-bg-olive.png') center / cover no-repeat;
      border-radius: 14px; padding: 20px 24px;
      color: #363614;
      box-shadow: inset 0 0 0 1px rgba(212,216,152,0.6);
    }
    .purchase-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid rgba(58,36,24,0.06);
      font-size: 13px;
    }
    .purchase-row:last-child { border-bottom: none; }
    .purchase-desc { font-weight: 600; }
    .purchase-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; margin-top: 3px; letter-spacing: 0.03em; opacity: 0.65;
    }
    .purchase-amount {
      font-family: 'Lora', Georgia, serif;
      font-weight: 700; color: var(--rose);
    }
    .empty-history { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
    .empty-history-img {
      width: 44px; height: 44px; flex-shrink: 0;
      background: url('prev-thumb.png') center / contain no-repeat; opacity: 0.55;
    }
    .empty-history-title {
      font-size: 13.5px; font-weight: 600; color: var(--ink);
    }
    .empty-history-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 12.5px; color: var(--ink-mid); margin-top: 2px;
    }

    /* ── Footer links ── */
    .footer-links {
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; color: var(--ink-lt); letter-spacing: 0.04em;
      opacity: 0.7;
    }
    .footer-links a { color: var(--ink-lt); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }

    /* ── Messages ── */
    .msg {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; padding: 10px 14px;
      border-radius: 8px; text-align: center; letter-spacing: 0.02em;
    }
    .msg.error   { background: rgba(217,107,124,0.10); color: var(--rose); }
    .msg.success { background: rgba(217,107,124,0.10); color: var(--rose); font-weight: 700; }

    /* ── Loading state ── */
    @keyframes ks-breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    .state {
      text-align: center; padding: 80px 20px;
      color: var(--ink-mid); font-size: 14px; line-height: 1.6;
    }
    .state strong {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400;
      display: block; font-size: 32px; color: var(--rose);
      margin-bottom: 8px;
      animation: ks-breathe 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
<div class="page" id="page">
  <div class="state"><strong>loading…</strong></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  const SUPABASE_URL = "https://kkasgbkgwjxiutdalbbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYXNnYmtnd2p4aXV0ZGFsYmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjU3OTQsImV4cCI6MjA5Mjg0MTc5NH0.z1JLMTzz3X_swbWHdt2z4UDKyUwjEfNYys5kdDMq3R4";
  const RAZORPAY_KEY = "rzp_test_SiSA0de5zVIh2x";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }

  const BUNDLES = [
    { letters: 5,  price_paise: 15000, label: "₹150", name: "Small moments",      desc: "For quick thoughts you don't want to lose." },
    { letters: 12, price_paise: 29900, label: "₹299", name: "A little collection", desc: "For when songs start meaning more." },
    { letters: 25, price_paise: 54900, label: "₹549", name: "Memory stack",        desc: "For the ones you'll come back to." },
  ];

  let currentUser = null;
  let creditsData = null;

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = "auth.html"; return; }
    currentUser = session.user;
    await loadAndRender();
  })();

  async function loadAndRender() {
    const [cRes, pRes] = await Promise.all([
      sb.from("user_credits").select("*").eq("user_id", currentUser.id).single(),
      sb.from("purchases").select("*").eq("user_id", currentUser.id).order("created_at", { ascending: false }).limit(20),
    ]);
    creditsData = cRes.data || { paid_credits: 0, lifetime: false, monthly_free_used_at: null };
    render(creditsData, pRes.data || []);
  }

  function freeAvailable(c) {
    if (!c.monthly_free_used_at) return true;
    const used = new Date(c.monthly_free_used_at);
    const now = new Date();
    return used.getFullYear() < now.getFullYear() ||
      (used.getFullYear() === now.getFullYear() && used.getMonth() < now.getMonth());
  }

  function render(c, purchases) {
    const free = freeAvailable(c);
    const total = c.lifetime ? null : c.paid_credits + (free ? 1 : 0);

    let heroNumber, heroStatus, heroCta;
    if (c.lifetime) {
      heroNumber = "∞";
      heroStatus = "Unlimited notes, forever.";
      heroCta = "";
    } else {
      heroNumber = total;
      heroStatus = free
        ? `${c.paid_credits} purchased · 1 free available this month`
        : "You've used your free note this month.";
      heroCta = `<button class="hero-cta" onclick="document.querySelector('.pricing-grid').scrollIntoView({behavior:'smooth'})">Write something again?</button>`;
    }

    const bundleCards = BUNDLES.map((b, i) => `
      <div class="bundle" data-bundle="${i}">
        <div class="bundle-sparkles"></div>
        <div class="bundle-top">
          <div class="bundle-name">${b.name}</div>
          <div class="bundle-count">${b.letters} notes</div>
        </div>
        <div class="bundle-bottom">
          <hr class="bundle-rule" />
          <div class="bundle-price">${b.label}</div>
          <div class="bundle-desc">${b.desc}</div>
        </div>
      </div>
    `).join("");

    const purchaseRows = purchases.length
      ? purchases.map(p => `
          <div class="purchase-row">
            <div>
              <div class="purchase-desc">${p.is_lifetime ? "Lifetime plan" : `${escHtml(String(p.credits_added))} letter${p.credits_added > 1 ? "s" : ""} bundle`}</div>
              <div class="purchase-date">${escHtml(new Date(p.created_at).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" }))}</div>
            </div>
            <div class="purchase-amount">₹${escHtml(String(Math.round(p.amount_paise / 100)))}</div>
          </div>
        `).join("")
      : `<div class="empty-history">
           <div class="empty-history-img"></div>
           <div>
             <div class="empty-history-title">No purchases yet</div>
             <div class="empty-history-sub">Your past purchases will appear here.</div>
           </div>
         </div>`;

    document.getElementById("page").innerHTML = `
      <div class="nav">
        <a class="nav-logo" href="index.html">keepsake.<span class="logo-spark">✦</span></a>
        <div class="nav-right">
          <a class="nav-link" href="notes.html">Notes</a>
          <a class="nav-link active" href="account.html">Account</a>
          <button class="btn-signout" id="signoutBtn">Sign out</button>
        </div>
      </div>

      <div class="hero-card">
        <div class="hero-content">
          <div class="hero-eyebrow">Your notes left</div>
          <div class="hero-number">${heroNumber}</div>
          <div class="hero-status">${heroStatus}</div>
          ${heroCta}
        </div>
      </div>

      <div class="tagline">
        <div class="tagline-sparkle">✦</div>
        <div class="tagline-main">Every note lives inside a moment in a song.</div>
        <div class="tagline-sub">Don't run out mid-memory.</div>
      </div>

      <div class="section-header"><span>Top up your notes</span></div>
      <div class="pricing-grid" id="bundleGrid">${bundleCards}</div>

      <div class="lifetime-card" id="lifetimeCard">
        <div class="lifetime-content">
          <div class="lifetime-title">Keep every note</div>
          <div class="lifetime-sub">Unlimited, forever</div>
        </div>
        <div class="lifetime-price-row">
          <div class="lifetime-price">₹999</div>
          <div class="lifetime-desc">Write as much as you want. No limits.</div>
        </div>
      </div>

      <div class="trust-line">🔒 Secure payments · UPI, cards, netbanking</div>

      <div id="paymentMsg"></div>

      <div class="section-header"><span>Purchase history</span></div>
      <div class="history-card">${purchaseRows}</div>

      <div class="footer-links">
        <a href="privacy.html" target="_blank">Privacy Policy</a>
        &nbsp;·&nbsp;
        <a href="index.html">Home</a>
      </div>
    `;

    document.getElementById("signoutBtn").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.dispatchEvent(new CustomEvent("keepsake:signout"));
      window.location.href = "auth.html";
    });

    document.getElementById("bundleGrid").addEventListener("click", (e) => {
      const el = e.target.closest("[data-bundle]");
      if (!el) return;
      const b = BUNDLES[parseInt(el.dataset.bundle)];
      openRazorpay(b.price_paise, b.letters, false, `${b.letters} Letter${b.letters > 1 ? "s" : ""} Bundle`);
    });

    document.getElementById("lifetimeCard").addEventListener("click", () => {
      openRazorpay(99900, 0, true, "Lifetime Plan");
    });
  }

  function openRazorpay(amountPaise, numCredits, isLifetime, description) {
    const options = {
      key: RAZORPAY_KEY,
      amount: amountPaise,
      currency: "INR",
      name: "Keepsake",
      description,
      prefill: { email: currentUser.email },
      theme: { color: "#D96B7C" },
      handler: async function (response) {
        const msg = document.getElementById("paymentMsg");
        msg.innerHTML = `<div class="msg">Processing…</div>`;
        const { error } = await sb.rpc("add_credits", {
          p_user_id: currentUser.id,
          p_credits: numCredits,
          p_lifetime: isLifetime,
          p_razorpay_id: response.razorpay_payment_id,
          p_amount_paise: amountPaise,
        });
        if (error) {
          msg.innerHTML = `<div class="msg error">Payment recorded but credit update failed — contact support with payment ID: ${escHtml(response.razorpay_payment_id)}</div>`;
        } else {
          msg.innerHTML = `<div class="msg success">✦ ${isLifetime ? "Lifetime plan activated!" : `${escHtml(String(numCredits))} letter${numCredits > 1 ? "s" : ""} added!`}</div>`;
          await loadAndRender();
        }
      },
      modal: { ondismiss: () => {} }
    };
    const rzp = new window.Razorpay(options);
    rzp.open();
  }
</script>
</body>
</html>
