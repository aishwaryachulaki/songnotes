  <style>
    :root {
      --rose:      #D96B7C;
      --tangerine: #F08C21;
      --cream:     #FFFBF4;
      --bg:        #F4D9A6;
      --ink:       #3A2E2A;
      --ink-mid:   #6B5A52;
      --ink-lt:    #A08878;
      --border:    rgba(58,36,24,0.09);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg) url('background.png') center / cover no-repeat fixed;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      color: var(--ink);
      position: relative;
      overscroll-behavior: none;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 600px) { .page { padding: 0 20px 60px; } }

    /* ── Nav ── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 0 10px;
    }
    .nav-logo {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400; font-size: 26px;
      color: var(--rose); text-decoration: none; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 5px;
      text-shadow: 0 1px 12px rgba(140,50,60,0.13);
    }
    .nav-logo .logo-spark {
      font-style: normal; font-family: sans-serif;
      font-size: 11px; color: var(--tangerine); font-weight: 400;
      vertical-align: super; line-height: 0;
    }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-email {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; color: var(--ink-mid); letter-spacing: 0.03em;
      opacity: 0.7;
    }
    .nav-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-mid);
      text-decoration: none; opacity: 0.65; transition: opacity 0.15s;
    }
    .nav-link:hover { opacity: 1; }
    .nav-link.active { opacity: 1; color: var(--rose); }
    .btn-signout {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 20px;
      background: rgba(217,107,124,0.10);
      border: 1.5px solid rgba(217,107,124,0.30);
      color: var(--rose); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-signout:hover { background: rgba(217,107,124,0.18); }

    /* ── Hero credits card ── */
    .hero-card {
      background: #f0dfa0 url('faq-bg-yellow.png') top / cover no-repeat;
      border-radius: 18px; padding: 28px 32px;
      position: relative; overflow: hidden; min-height: 170px;
      color: #4a3800;
      box-shadow: inset 0 0 0 1px rgba(240,223,160,0.6);
    }
    .hero-card::before {
      content: '';
      position: absolute;
      top: 50%;
      right: -6%;
      transform: translateY(calc(-50% + 20px)) scale(1.10);
      width: 42%;
      height: 95%;
      background: url('poppy.png') center / contain no-repeat;
      opacity: 0.24;
      pointer-events: none;
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 12px;
    }
    .hero-number {
      font-family: 'Lora', Georgia, serif;
      font-size: 72px; font-weight: 700;
      line-height: 1; margin-bottom: 12px;
    }
    .hero-status { font-size: 12.5px; line-height: 1.55; margin-bottom: 8px; opacity: 0.75; }
    .hero-cta {
      font-family: 'Spectral', Georgia, serif;
      font-size: 13px; color: var(--rose); font-style: italic;
      background: none; border: none; padding: 0; cursor: pointer;
    }
    .hero-cta:hover { text-decoration: underline; }

    /* ── Tagline ── */
    .tagline { text-align: center; padding: 6px 0 2px; }
    .tagline-sparkle { font-size: 11px; color: var(--rose); opacity: 0.45; margin-bottom: 8px; }
    .tagline-main {
      font-family: 'Lora', Georgia, serif;
      font-size: 14px; color: var(--ink-mid); line-height: 1.6;
    }
    .tagline-sub {
      font-family: 'Spectral', Georgia, serif;
      font-size: 14px; color: var(--rose); font-style: italic; margin-top: 3px;
      opacity: 0.82;
    }

    /* ── Section header ── */
    .section-header { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    .section-header span {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--rose); white-space: nowrap;
      opacity: 0.75;
    }
    .section-header::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(217,107,124,0.22);
    }

    /* ── Pricing grid ── */
    .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .bundle:nth-child(1),
    .bundle:nth-child(2),
    .bundle:nth-child(3) { background: #f0e8dc url('lifetime-background.png') top / cover no-repeat; color: #3a2418; border: 1.5px solid rgba(217,107,124,0.45); box-shadow: inset 0 0 0 1px rgba(240,232,220,0.6); }
    .bundle {
      border-radius: 14px; padding: 20px 18px 18px;
      display: flex; flex-direction: column; gap: 8px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: filter 0.15s;
    }
    .bundle:hover { filter: brightness(0.96); }
    .bundle-sparkles {
      position: absolute; top: 12px; right: 12px;
      width: 28px; height: 28px;
      background: url('credits-sparkles.png') center / contain no-repeat;
      pointer-events: none; opacity: 0.75;
    }
    .bundle-top { display: flex; flex-direction: column; gap: 4px; }
    .bundle-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 600;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--rose);
    }
    .bundle-count {
      font-family: 'Lora', Georgia, serif;
      font-size: 26px; font-weight: 400; line-height: 1.1;
    }
    .bundle-bottom { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .bundle-rule { border: none; border-top: 1px solid rgba(58,36,24,0.10); margin-bottom: 2px; }
    .bundle-price {
      font-family: 'Lora', Georgia, serif;
      font-size: 22px; font-weight: 600; color: var(--rose);
    }
    .bundle-desc { font-size: 10px; line-height: 1.4; opacity: 0.65; }

    /* ── Lifetime card ── */
    .lifetime-card {
      background: #f0c0c8 url('faq-bg-pink.png') top / cover no-repeat;
      box-shadow: inset 0 0 0 1px rgba(240,192,200,0.6);
      border-radius: 14px; padding: 20px 24px;
      position: relative; overflow: hidden;
      cursor: pointer; transition: filter 0.15s;
      color: #5c2d2d;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .lifetime-card:hover { filter: brightness(0.97); }
    .lifetime-content { position: relative; z-index: 1; flex: 1; }
    .lifetime-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 17px; font-weight: 400;
      line-height: 1.2; margin-bottom: 2px;
      color: #5c2d2d;
    }
    .lifetime-sub {
      font-family: 'Spectral', Georgia, serif;
      font-size: 13px; color: var(--rose); font-style: italic;
    }
    .lifetime-rule { display: none; }
    .lifetime-price-row {
      display: flex; flex-direction: column; align-items: flex-end;
      flex-shrink: 0; gap: 2px;
    }
    .lifetime-price {
      font-family: 'Lora', Georgia, serif;
      font-size: 24px; font-weight: 500; line-height: 1; color: var(--rose);
    }
    .lifetime-desc { font-size: 10px; line-height: 1.4; opacity: 0.65; text-align: right; color: #5c2d2d; }

    /* ── Trust line + region line ── */
    .trust-line {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10.5px; color: var(--ink-lt); letter-spacing: 0.03em;
    }
    .region-line {
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 9.5px; color: var(--ink-lt); letter-spacing: 0.03em;
      margin-top: -4px;
    }
    .region-link {
      color: var(--rose); text-decoration: none; opacity: 0.7;
      transition: opacity 0.15s;
    }
    .region-link:hover { opacity: 1; text-decoration: underline; }

    /* ── Purchase history ── */
    .history-card {
      background: #d4d898 url('faq-bg-olive.png') center / cover no-repeat;
      border-radius: 14px; padding: 20px 24px;
      color: #363614;
      box-shadow: inset 0 0 0 1px rgba(212,216,152,0.6);
    }
    .purchase-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid rgba(58,36,24,0.06);
      font-size: 13px;
    }
    .purchase-row:last-child { border-bottom: none; }
    .purchase-desc { font-weight: 600; }
    .purchase-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; margin-top: 3px; letter-spacing: 0.03em; opacity: 0.65;
    }
    .purchase-amount {
      font-family: 'Lora', Georgia, serif;
      font-weight: 700; color: var(--rose);
    }
    .empty-history { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
    .empty-history-img {
      width: 32px; height: 64px; flex-shrink: 0;
      background: url('flower.png') center / contain no-repeat; opacity: 0.45;
    }
    .empty-history-title {
      font-size: 13.5px; font-weight: 600; color: var(--ink);
    }
    .empty-history-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 12.5px; color: var(--ink-mid); margin-top: 2px;
    }

    /* ── Danger zone ── */
    .danger-zone {
      border: 1.5px solid rgba(217,107,124,0.20);
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .danger-zone-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 9.5px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--rose); opacity: 0.6;
    }
    .danger-zone-title {
      font-size: 14px; font-weight: 700; color: var(--ink);
    }
    .danger-zone-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 12.5px;
      color: var(--ink-mid); line-height: 1.5;
    }
    .btn-delete {
      align-self: flex-start;
      margin-top: 4px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 20px;
      background: rgba(217,107,124,0.10);
      border: 1.5px solid rgba(217,107,124,0.30);
      color: var(--rose); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-delete:hover { background: rgba(217,107,124,0.18); }

    /* ── Delete confirmation modal ── */
    .delete-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(58,36,24,0.45);
      backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      animation: ks-payment-fade-in 0.2s ease both;
    }
    .delete-modal {
      background: var(--cream);
      border: 1.5px solid rgba(58,36,24,0.10);
      border-radius: 18px;
      padding: 32px 28px 28px;
      max-width: 360px; width: 90%;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 8px 48px rgba(58,36,24,0.15);
    }
    .delete-modal-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(217,107,124,0.10);
      border: 1.5px solid rgba(217,107,124,0.20);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2px;
    }
    .delete-modal-icon svg {
      width: 20px; height: 20px;
      stroke: var(--rose); fill: none;
      stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
    }
    .delete-modal h3 {
      font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1.2;
    }
    .delete-modal p {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 13px;
      color: var(--ink-mid); line-height: 1.6;
    }
    .delete-modal-actions {
      display: flex; gap: 10px; margin-top: 4px;
    }
    .btn-cancel {
      flex: 1;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      padding: 10px; border-radius: 8px;
      border: 1.5px solid rgba(58,36,24,0.12);
      background: transparent; color: var(--ink-mid);
      cursor: pointer; transition: background 0.15s;
    }
    .btn-cancel:hover { background: rgba(58,36,24,0.05); }
    .btn-confirm-delete {
      flex: 1;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      padding: 10px; border-radius: 8px;
      border: none; background: var(--rose); color: white;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-confirm-delete:hover { opacity: 0.85; }
    .btn-confirm-delete:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Footer links ── */
    .footer-links {
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; color: var(--ink-lt); letter-spacing: 0.04em;
      opacity: 0.7;
    }
    .footer-links a { color: var(--ink-lt); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }

    /* ── Messages ── */
    .msg {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; padding: 10px 14px;
      border-radius: 8px; text-align: center; letter-spacing: 0.02em;
    }
    .msg.error   { background: rgba(217,107,124,0.10); color: var(--rose); }
    .msg.success { background: rgba(217,107,124,0.10); color: var(--rose); font-weight: 700; }

    /* ── Payment loading feedback ── */
    @keyframes ks-payment-fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes ks-dot-pulse {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40%            { transform: translateY(-4px); opacity: 1; }
    }
    .payment-feedback {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 16px 12px;
      border-radius: 12px;
      background: var(--cream);
      border: 1.5px solid rgba(58,36,24,0.08);
      animation: ks-payment-fade-in 0.3s ease both;
    }
    .payment-feedback-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--butter);
      border: 1.5px solid rgba(58,36,24,0.10);
      display: flex; align-items: center; justify-content: center;
    }
    .payment-feedback-icon svg {
      width: 18px; height: 18px;
      stroke: var(--rose); fill: none;
      stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
    }
    .payment-feedback-icon.success-icon { background: rgba(217,107,124,0.10); }
    .payment-feedback-icon.error-icon   { background: rgba(217,107,124,0.08); }
    .payment-feedback-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink-mid);
    }
    .payment-feedback-label.error  { color: var(--rose); }
    .payment-feedback-label.success { color: var(--rose); }
    .payment-feedback-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-size: 12px;
      color: var(--ink-lt);
      text-align: center;
      line-height: 1.5;
    }
    .payment-dots {
      display: flex; gap: 4px; align-items: center;
    }
    .payment-dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--rose); opacity: 0.3;
      animation: ks-dot-pulse 1.2s ease-in-out infinite;
    }
    .payment-dots span:nth-child(2) { animation-delay: 0.2s; }
    .payment-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ── Loading state ── */
    @keyframes ks-breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    .state {
      text-align: center; padding: 80px 20px;
      color: var(--ink-mid); font-size: 14px; line-height: 1.6;
    }
    .state strong {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400;
      display: block; font-size: 32px; color: var(--rose);
      margin-bottom: 8px;
      animation: ks-breathe 2s ease-in-out infinite;
    }
  </style>
</head>

  // ── Tier detection (VPN-resistant: uses OS timezone, not IP) ─────────────────
  function detectTier() {
    // Supabase-stored override (set manually by support) takes top priority —
    // checked in loadAndRender() after the DB fetch, not here.
    // localStorage override is written there too so it survives page refreshes.
    const cached = localStorage.getItem("ks_tier_override");
    if (cached && ["1","2","3","4"].includes(cached)) return parseInt(cached);
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    return TZ_TIER[tz] ?? 4;
  }

  let activeTier = 4; // resolved in loadAndRender after DB fetch
  let currentUser = null;
  let currentAccessToken = null;
  let creditsData = null;

  // Reliable session sync into the extension (the auth-bridge content script
  // listens on this page). Re-push every 200ms until the bridge confirms, so
  // landing straight here after login still syncs even if auth.html's dispatch
  // raced the content script's injection.
  function pushSessionToExtension(session) {
    const detail = {
      access_token: session.access_token,
      refresh_token: session.refresh_token,
      expires_at: session.expires_at,
      user: {
        id: session.user.id,
        email: session.user.email,
        name: session.user.user_metadata?.full_name || session.user.email,
        avatar: session.user.user_metadata?.avatar_url || null,
      },
    };
    let synced = false;
    window.addEventListener("keepsake:auth_saved", () => { synced = true; }, { once: true });
    let tries = 0;
    (function push() {
      if (synced || tries++ > 10) return;
      window.dispatchEvent(new CustomEvent("keepsake:auth", { detail }));
      setTimeout(push, 200);
    })();
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = "auth.html"; return; }
    currentUser = session.user;
    currentAccessToken = session.access_token;
    pushSessionToExtension(session);

    // Warm up the Edge Function in the background so it's ready when user clicks buy
    fetch(`${SUPABASE_URL}/functions/v1/create-razorpay-order`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${currentAccessToken}`,
        "x-warmup": "1",
      },
      body: JSON.stringify({ warmup: true }),
    }).catch(() => {}); // silently ignore — this is best-effort only

    await loadAndRender();
  })();

  async function loadAndRender() {
    const [cRes, pRes] = await Promise.all([
      sb.from("user_credits").select("*").eq("user_id", currentUser.id).single(),
      sb.from("purchases").select("*").eq("user_id", currentUser.id).order("created_at", { ascending: false }).limit(20),
    ]);
    creditsData = cRes.data || { paid_credits: 0, lifetime: false, free_credits_used: 0 };

    // country_tier column in user_credits (set by support, nullable INT 1–4).
    // Takes precedence over everything — cache it in localStorage so it
    // survives page refreshes without a round-trip.
    // NOTE: run this SQL in Supabase before deploying:
    //   ALTER TABLE user_credits ADD COLUMN IF NOT EXISTS country_tier INT;
    if (creditsData.country_tier && [1,2,3,4].includes(creditsData.country_tier)) {
      activeTier = creditsData.country_tier;
      localStorage.setItem("ks_tier_override", String(activeTier));
    } else {
      activeTier = detectTier();
    }

    render(creditsData, pRes.data || []);
  }

  function handlePurchase(priceUnits, numCredits, isLifetime, description) {
    const tier = TIERS[activeTier];
    if (tier.payment === "razorpay") {
      openRazorpay(priceUnits, numCredits, isLifetime, description);
    } else if (tier.payment === "stripe") {
      openStripe(priceUnits, numCredits, isLifetime, description);
    }
  }

  async function openRazorpay(amountPaise, numCredits, isLifetime, description) {
    const tier = TIERS[activeTier];
    const currency = tier.currency; // "INR" for tier 1, "USD" for tiers 2-4
    const msg = document.getElementById("paymentMsg");
    msg.innerHTML = `
      <div class="payment-feedback">
        <div class="payment-feedback-icon">
          <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="payment-feedback-label">Preparing your order</div>
        <div class="payment-dots"><span></span><span></span><span></span></div>
      </div>`;

    // Step 1: Create order server-side
    let order;
    try {
      const res = await fetch(
        `${SUPABASE_URL}/functions/v1/create-razorpay-order`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${currentAccessToken}`,
          },
          // Server decides price + credits from this package id; the client
          // can no longer set the amount or the number of credits.
          body: JSON.stringify({
            package_id: isLifetime ? "lifetime" : `letters_${numCredits}`,
            currency: currency,
          }),
        }
      );
      if (!res.ok) throw new Error(await res.text());
      order = await res.json();
    } catch (err) {
      console.error("Order creation failed:", err);
      msg.innerHTML = `
        <div class="payment-feedback">
          <div class="payment-feedback-icon error-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="payment-feedback-label error">Could not initiate payment</div>
          <div class="payment-feedback-sub">Please try again in a moment.</div>
        </div>`;
      return;
    }

    msg.innerHTML = "";

    // Step 2: Open Razorpay checkout with order_id
    const options = {
      key: order.key_id || RAZORPAY_KEY,
      amount: order.amount,
      currency: order.currency,
      order_id: order.order_id,
      name: "Keepsake",
      description,
      prefill: { email: currentUser.email },
      theme: { color: "#D96B7C" },

      // Step 3: On success, verify signature server-side before adding credits
      handler: async function (response) {
        msg.innerHTML = `
          <div class="payment-feedback">
            <div class="payment-feedback-icon">
              <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div class="payment-feedback-label">Verifying payment</div>
            <div class="payment-dots"><span></span><span></span><span></span></div>
          </div>`;
        try {
          const verifyRes = await fetch(
            `${SUPABASE_URL}/functions/v1/verify-razorpay-payment`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${currentAccessToken}`,
              },
              // Only the proof of payment — credits are derived server-side from
              // the stored order, never from anything we send here.
              body: JSON.stringify({
                razorpay_order_id:   response.razorpay_order_id,
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_signature:  response.razorpay_signature,
              }),
            }
          );
          const result = await verifyRes.json();
          if (!verifyRes.ok || !result.success) {
            const payId = escHtml(response.razorpay_payment_id);
            msg.innerHTML = `
              <div class="payment-feedback">
                <div class="payment-feedback-icon error-icon">
                  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <div class="payment-feedback-label error">${result.error || "Verification failed"}</div>
                <div class="payment-feedback-sub">Contact support with payment ID:<br><strong>${payId}</strong></div>
              </div>`;
          } else {
            const successText = isLifetime ? "Lifetime plan activated!" : `${escHtml(String(numCredits))} letter${numCredits > 1 ? "s" : ""} added!`;
            msg.innerHTML = `
              <div class="payment-feedback">
                <div class="payment-feedback-icon success-icon">
                  <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="payment-feedback-label success">✦ ${successText}</div>
                <div class="payment-feedback-sub">Your credits have been updated.</div>
              </div>`;
            await loadAndRender();
          }
        } catch (err) {
          console.error("Verification error:", err);
          msg.innerHTML = `
            <div class="payment-feedback">
              <div class="payment-feedback-icon error-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              </div>
              <div class="payment-feedback-label error">Verification error</div>
              <div class="payment-feedback-sub">Payment may have gone through. Contact support with ID:<br><strong>${escHtml(response.razorpay_payment_id)}</strong></div>
            </div>`;
        }
      },

      modal: {
        ondismiss: () => {
          msg.innerHTML = "";
        }
      }
    };

    const rzp = new window.Razorpay(options);
    rzp.on("payment.failed", (resp) => {
      msg.innerHTML = `
        <div class="payment-feedback">
          <div class="payment-feedback-icon error-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="payment-feedback-label error">Payment failed</div>
          <div class="payment-feedback-sub">${escHtml(resp.error?.description || "Something went wrong. Please try again.")}</div>
        </div>`;
    });
    rzp.open();
  }

  // Stripe — wired up once the Stripe account is live.
  // Until then, show prices correctly but direct purchase attempts to email.
  function openStripe(amountCents, numCredits, isLifetime, description) {
    const msg = document.getElementById("paymentMsg");
    const supportEmail = "hello@dropakeepsake.com";
    const subject = encodeURIComponent(`Purchase request: ${description}`);
    const body = encodeURIComponent(`Hi,\n\nI'd like to purchase: ${description}\nMy account email: ${currentUser.email}\n\nThanks`);
    msg.innerHTML = `<div class="msg error">International card payments are coming very soon. In the meantime, email us at <a href="mailto:${supportEmail}?subject=${subject}&body=${body}" style="color:var(--rose);font-weight:600">${supportEmail}</a> and we'll sort it out manually.</div>`;
  }
</script>
</body>
</html>
