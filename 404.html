<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // GitHub Pages doesn't redirect /account → /account/ automatically.
    // This 404 page catches those requests and adds the trailing slash
    // so folder/index.html files are served correctly.
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    if (!path.endsWith('/')) {
      window.location.replace(path + '/' + search + hash);
    } else {
      // Genuine 404 — redirect home
      window.location.replace('/' + search + hash);
    }
  </script>
</head>
<body></body>
</html>
