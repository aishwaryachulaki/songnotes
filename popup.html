<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">

      <!-- Auth gate — shown when not signed in -->
      <div id="authGate" class="stamp stamp-compose hidden">
        <div class="hello">Sign in to send letters and manage credits.</div>
        <button id="signInBtn" class="btn primary">Sign in / Create account</button>
      </div>

      <!-- Auth bar — shown when signed in -->
      <div id="authBar" class="auth-bar hidden">
        <span id="authEmail" class="auth-email"></span>
        <div class="auth-right">
          <span id="creditsBadge" class="credits-badge"></span>
          <a id="accountLink" href="#" class="auth-link">Account</a>
          <a id="signOutLink" href="#" class="auth-link">Sign out</a>
        </div>
      </div>

      <!-- Featured track stamp -->
      <div class="stamp stamp-track track">
        <div class="stamp-eyebrow">♪ now playing</div>
        <div id="trackTitle" class="title">Loading…</div>
        <div id="trackArtist" class="artist"></div>
      </div>

      <!-- Name setup stamp -->
      <div id="nameBlock" class="stamp stamp-compose name-block hidden">
        <label>Your name (shown to friends)</label>
        <div class="row">
          <input id="senderName" type="text" placeholder="e.g. Sam" />
          <button id="saveName" class="btn primary">Save</button>
        </div>
      </div>

      <!-- Note composer stamp -->
      <div id="composer" class="stamp stamp-compose composer hidden">
        <div class="hello">writing as <strong id="whoami">—</strong> · <a href="#" id="changeName">change</a></div>
        <input id="recipientName" class="receiver-input" type="text" placeholder="Recipient name" />
        <textarea id="note" placeholder="Write a note for this song…" rows="3"></textarea>
        <div class="timestamp-row">
          <input id="ts" class="timestamp-input" type="text" placeholder="Timestamp (e.g. 1:24) — optional" />
          <button id="useCurrent" class="btn now-btn">Now</button>
        </div>
        <div class="row">
          <button id="save" class="btn primary">Save note</button>
          <span id="status" class="status"></span>
        </div>
      </div>

      <!-- Notes bento grid -->
      <div class="notes-section-header">
        <span>Notes for this song</span>
      </div>
      <div id="notes" class="notes"></div>

      <!-- Share stamp -->
      <div class="stamp stamp-share share">
        <div id="shareSummary" class="share-summary">No notes yet — write one above to start a shared experience.</div>
        <input id="playlistUrl" class="playlist-input" type="text" placeholder="Add playlist link" />
        <button id="copyShare" class="btn share-btn">✉ Send all notes</button>
        <div id="shareInfo" class="share-info"></div>
        <div class="row" style="gap:6px">
          <button id="resetShare" class="btn ghost" style="flex:1">New share</button>
        </div>
      </div>

      <!-- Import block -->
      <div class="import-block">
        <details>
          <summary>Import a shared letter</summary>
          <div class="row" style="margin-top:8px">
            <input id="importId" type="text" placeholder="Paste share link" />
            <button id="importBtn" class="btn">Import</button>
          </div>
          <div id="importStatus" class="status"></div>
        </details>
        <div id="previousList" class="previous-list"></div>
      </div>

    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
