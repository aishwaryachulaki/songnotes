<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400&family=Lora:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --butter:    #F4D9A6;
      --cream:     #FFFBF4;
      --rose:      #D96B7C;
      --tangerine: #F08C21;
      --ink:       #3A2E2A;
      --ink-mid:   #6B5A52;
      --ink-lt:    #A08878;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--butter) url('background.png') center / cover no-repeat fixed;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--ink);
      overscroll-behavior: none;
    }

    /* ── Nav ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 32px; width: 100%; max-width: 1440px; margin: 0 auto;
    }
    .nav-logo {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400; font-size: 26px;
      color: var(--rose); text-decoration: none; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 5px;
      text-shadow: 0 1px 12px rgba(140,50,60,0.13);
    }
    .nav-logo .logo-spark {
      font-style: normal; font-family: sans-serif;
      font-size: 11px; color: var(--tangerine); font-weight: 400;
      vertical-align: super; line-height: 0;
    }
    .nav-back {
      font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--ink-mid); text-decoration: none; opacity: 0.6;
      transition: opacity 0.15s;
    }
    .nav-back:hover { opacity: 1; }

    /* ── Auth main ── */
    .auth-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 56px;
    }

    /* ── Card ── */
    .card {
      background: var(--cream);
      border: 1.5px solid rgba(58,36,24,0.09);
      border-radius: 20px;
      padding: 36px 32px 32px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      box-shadow: 0 8px 48px rgba(58,36,24,0.10);
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: '✦';
      position: absolute;
      top: 22px; right: 26px;
      font-size: 24px;
      color: var(--rose);
      opacity: 0.12;
      pointer-events: none;
    }

    /* ── Card heading ── */
    .card-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }
    .card-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      color: var(--rose);
      opacity: 0.82;
      margin-top: 5px;
    }

    /* ── Tabs — underline style ── */
    .tabs {
      display: flex;
      border-bottom: 1.5px solid rgba(58,36,24,0.08);
    }
    .tab {
      flex: 1;
      padding: 8px 4px 10px;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1.5px;
      background: transparent;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-lt);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--ink-mid); }
    .tab.active { color: var(--rose); border-bottom-color: var(--rose); }

    /* ── Forms ── */
    .panel { display: flex; flex-direction: column; gap: 14px; }
    .panel.hidden { display: none; }

    label {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 600;
      color: var(--ink-mid);
      text-transform: uppercase; letter-spacing: 0.09em;
      display: block; margin-bottom: 5px;
    }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(58,36,24,0.12);
      font-family: 'Lora', Georgia, serif;
      font-size: 14px;
      background: rgba(58,36,24,0.025);
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      outline: none;
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(217,107,124,0.12);
    }
    input::placeholder { color: var(--ink-lt); font-style: italic; }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 12px;
      border: none; border-radius: 24px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.45; cursor: default; transform: none; }
    .btn-primary {
      background: rgba(217,107,124,0.10);
      color: var(--rose);
      border: 1.5px solid rgba(217,107,124,0.30);
    }
    .btn-primary:hover { background: rgba(217,107,124,0.17); }
    .btn-google {
      background: rgba(217,107,124,0.07);
      color: var(--rose);
      border: 1.5px solid rgba(217,107,124,0.25);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover { background: rgba(217,107,124,0.14); }

    /* ── Misc ── */
    .toggle-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; text-align: center;
      color: var(--ink-mid);
    }
    .toggle-link a { color: var(--rose); font-weight: 600; cursor: pointer; text-decoration: none; }
    .toggle-link a:hover { text-decoration: underline; }

    .hint {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-size: 12px;
      text-align: center;
      color: var(--ink-lt);
    }

    .msg { font-size: 12px; padding: 10px 12px; border-radius: 8px; text-align: center; font-family: 'Montserrat', sans-serif; letter-spacing: 0.02em; }
    .msg.error   { background: rgba(217,107,124,0.10); color: var(--rose); }
    .msg.success { background: rgba(240,140,33,0.10); color: var(--tangerine); font-weight: 600; }

    /* ── Success state ── */
    @keyframes ks-fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes ks-pulse-ring {
      0%   { transform: scale(0.92); opacity: 0.6; }
      50%  { transform: scale(1.06); opacity: 0.15; }
      100% { transform: scale(0.92); opacity: 0.6; }
    }
    .success-state {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      padding: 8px 0 4px;
      animation: ks-fade-up 0.4s ease both;
    }
    .success-icon-wrap {
      position: relative;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success-icon-wrap::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: var(--rose);
      opacity: 0.10;
      animation: ks-pulse-ring 2s ease-in-out infinite;
    }
    .success-icon-bg {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--butter);
      border: 1.5px solid rgba(58,36,24,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(58,36,24,0.08);
    }
    .success-icon-bg svg {
      width: 26px;
      height: 26px;
      fill: none;
      stroke: var(--rose);
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .success-state h2 {
      font-family: 'Lora', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }
    .success-state p {
      font-size: 13px;
      color: var(--ink-mid);
      line-height: 1.6;
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
    }
    .success-dots {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin-top: 2px;
    }
    .success-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--rose);
      opacity: 0.35;
      animation: ks-dot-bounce 1.2s ease-in-out infinite;
    }
    .success-dots span:nth-child(2) { animation-delay: 0.2s; }
    .success-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes ks-dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40%            { transform: translateY(-5px); opacity: 0.8; }
    }

    .privacy-note {
      margin-top: 16px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10.5px;
      text-align: center;
      color: var(--ink-lt);
      letter-spacing: 0.02em;
    }
    .privacy-note a { color: var(--ink-lt); text-decoration: underline; text-underline-offset: 2px; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">keepsake.<span class="logo-spark">✦</span></a>
  <a class="nav-back" href="index.html">← Home</a>
</nav>

<div class="auth-main">
  <div class="card" id="card">

    <div>
      <h1 class="card-title">Sign in</h1>
      <p class="card-sub">to send letters and manage your credits</p>
    </div>

    <!-- Tab switcher -->
    <div class="tabs">
      <button class="tab active" data-tab="google">Google</button>
      <button class="tab" data-tab="email">Email</button>
      <button class="tab" data-tab="magic">Magic link</button>
    </div>

    <!-- Google panel -->
    <div class="panel" id="panel-google">
      <div id="googleMsg"></div>
      <button class="btn btn-google" id="googleBtn">
        <svg width="17" height="17" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
        </svg>
        ✧ Continue with Google
      </button>
      <p class="hint">Fastest, no password needed</p>
    </div>

    <!-- Email panel -->
    <div class="panel hidden" id="panel-email">
      <div id="emailMsg"></div>
      <div>
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div>
        <label id="pwLabel">Password</label>
        <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" id="emailBtn">✧ Sign in</button>
      <div class="toggle-link">
        <span id="toggleText">Don't have an account?</span>
        <a id="toggleMode"> Sign up</a>
      </div>
    </div>

    <!-- Magic link panel -->
    <div class="panel hidden" id="panel-magic">
      <div id="magicMsg"></div>
      <div>
        <label>Email</label>
        <input type="email" id="magicInput" placeholder="you@example.com" autocomplete="email" />
      </div>
      <button class="btn btn-primary" id="magicBtn">✧ Send magic link</button>
      <p class="hint">We'll email you a one-click sign-in link</p>
    </div>

  </div>

  <div id="turnstile-box" style="display:flex;justify-content:center;margin:14px 0 0;"></div>

  <p class="privacy-note">
    By signing in you agree to our <a href="privacy.html" target="_blank">Privacy Policy</a>
  </p>
</div>

<script>
  // Turnstile bootstrap — define the onload callback before the widget script loads.
  window._turnstileReady = false;
  window.onloadTurnstileCallback = function () {
    window._turnstileReady = true;
    if (typeof window._initTurnstile === "function") window._initTurnstile();
  };
</script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1/dist/umd/supabase.js" integrity="sha384-EjUdIVmzWliPzdzhxZ9ZoO0etXLKWuUPUftAGxP6qH6Lm4oLwoLaJR0Ba4pIDiDL" crossorigin="anonymous"></script>
<script>
  const SUPABASE_URL = "https://kkasgbkgwjxiutdalbbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYXNnYmtnd2p4aXV0ZGFsYmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjU3OTQsImV4cCI6MjA5Mjg0MTc5NH0.z1JLMTzz3X_swbWHdt2z4UDKyUwjEfNYys5kdDMq3R4";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Cloudflare Turnstile (bot protection on signup / login / magic link) ──
  // 1) Paste your Turnstile SITE key below.  2) Enable CAPTCHA (Turnstile) in
  // Supabase Auth and paste the SECRET key there.  Until BOTH are done this stays
  // dormant (CAPTCHA_ON = false) and auth works exactly as before.
  const TURNSTILE_SITE_KEY = "0x4AAAAAADfEc-bCQxMk-joS";
  const CAPTCHA_ON = !!TURNSTILE_SITE_KEY && TURNSTILE_SITE_KEY.indexOf("PASTE_") === -1;
  let _turnstileId = null;
  let _captchaToken = null;
  let _captchaResolve = null;
  let _captchaWait = new Promise((r) => { _captchaResolve = r; });
  window._initTurnstile = function () {
    if (!CAPTCHA_ON || !window.turnstile || _turnstileId !== null) return;
    const box = document.getElementById("turnstile-box");
    if (!box) return;
    try {
      _turnstileId = window.turnstile.render(box, {
        sitekey: TURNSTILE_SITE_KEY,
        appearance: "interaction-only", // stays invisible unless a real challenge is needed
        theme: "light",
        callback: (t) => { _captchaToken = t; if (_captchaResolve) _captchaResolve(t); },
        "expired-callback": () => { _captchaToken = null; _captchaWait = new Promise((r) => { _captchaResolve = r; }); },
        "error-callback": () => { _captchaToken = null; },
      });
    } catch (_) {}
  };
  if (CAPTCHA_ON && window._turnstileReady) window._initTurnstile();
  // Resolve the silently-issued token, waiting briefly if it isn't ready yet
  // (the widget is invisible, so there's nothing for the user to click).
  async function getCaptchaToken(timeoutMs = 8000) {
    if (!CAPTCHA_ON) return undefined;
    if (_captchaToken) return _captchaToken;
    return Promise.race([
      _captchaWait,
      new Promise((r) => setTimeout(() => r(null), timeoutMs)),
    ]);
  }
  function resetCaptcha() {
    if (CAPTCHA_ON && window.turnstile && _turnstileId !== null) {
      try { window.turnstile.reset(_turnstileId); } catch (_) {}
      _captchaToken = null;
      _captchaWait = new Promise((r) => { _captchaResolve = r; });
    }
  }

  let redirecting = false;

  function doRedirect() {
    window.location.href = "https://dropakeepsake.com/notes.html";
  }

  sb.auth.onAuthStateChange((event, session) => {
    if (redirecting) return;
    if (session && (event === "SIGNED_IN" || event === "TOKEN_REFRESHED" || event === "INITIAL_SESSION")) {
      redirecting = true;
      window.dispatchEvent(new CustomEvent("keepsake:auth", {
        detail: {
          access_token: session.access_token,
          refresh_token: session.refresh_token,
          expires_at: session.expires_at,
          user: {
            id: session.user.id,
            email: session.user.email,
            name: session.user.user_metadata?.full_name || session.user.email,
            avatar: session.user.user_metadata?.avatar_url || null,
          }
        }
      }));
      document.getElementById("card").innerHTML = `
        <div class="success-state">
          <div class="success-icon-wrap">
            <div class="success-icon-bg">
              <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
          </div>
          <h2>You're in!</h2>
          <p>Taking you to your notes…</p>
          <div class="success-dots"><span></span><span></span><span></span></div>
        </div>
      `;
      // Wait for the extension bridge to confirm the session is written to
      // storage before navigating — falls back to 1.5s if bridge isn't present.
      const fallback = setTimeout(doRedirect, 1500);
      window.addEventListener("keepsake:auth_saved", () => {
        clearTimeout(fallback);
        doRedirect();
      }, { once: true });
    }
  });

  // Tab switching
  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.add("hidden"));
      btn.classList.add("active");
      document.getElementById("panel-" + btn.dataset.tab).classList.remove("hidden");
    });
  });

  // Google
  document.getElementById("googleBtn").addEventListener("click", async () => {
    const { error } = await sb.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.href }
    });
    if (error) showMsg("googleMsg", error.message, "error");
  });

  // Email / Password
  let emailMode = "signin";
  document.getElementById("toggleMode").addEventListener("click", () => {
    emailMode = emailMode === "signin" ? "signup" : "signin";
    document.getElementById("emailBtn").textContent     = emailMode === "signin" ? "Sign in" : "Create account";
    document.getElementById("toggleText").textContent   = emailMode === "signin" ? "Don't have an account?" : "Already have an account?";
    document.getElementById("toggleMode").textContent   = emailMode === "signin" ? " Sign up" : " Sign in";
    document.getElementById("pwLabel").textContent      = emailMode === "signin" ? "Password" : "Choose a password";
    document.getElementById("pwInput").autocomplete     = emailMode === "signin" ? "current-password" : "new-password";
  });

  document.getElementById("emailBtn").addEventListener("click", async (e) => {
    e.target.disabled = true;
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("pwInput").value;
    document.getElementById("emailMsg").innerHTML = "";
    if (!email || !password) {
      showMsg("emailMsg", "Please enter your email and password.", "error");
      e.target.disabled = false; return;
    }
    const captchaToken = await getCaptchaToken();
    if (CAPTCHA_ON && !captchaToken) {
      showMsg("emailMsg", "Couldn't verify you're human. Please refresh and try again.", "error");
      e.target.disabled = false; return;
    }
    const fn = emailMode === "signin"
      ? sb.auth.signInWithPassword({ email, password, options: { captchaToken } })
      : sb.auth.signUp({ email, password, options: { captchaToken } });
    const { error } = await fn;
    resetCaptcha();
    if (error) { showMsg("emailMsg", error.message, "error"); e.target.disabled = false; return; }
    // Only show the "check your email" message if onAuthStateChange hasn't
    // already taken over (which happens when Supabase auto-confirms the signup).
    if (emailMode === "signup" && !redirecting) showMsg("emailMsg", "Account created! Check your email to confirm.", "success");
    e.target.disabled = false;
  });

  // Magic link
  document.getElementById("magicBtn").addEventListener("click", async (e) => {
    e.target.disabled = true;
    const email = document.getElementById("magicInput").value.trim();
    document.getElementById("magicMsg").innerHTML = "";
    if (!email) { showMsg("magicMsg", "Please enter your email.", "error"); e.target.disabled = false; return; }
    const captchaToken = await getCaptchaToken();
    if (CAPTCHA_ON && !captchaToken) {
      showMsg("magicMsg", "Couldn't verify you're human. Please refresh and try again.", "error");
      e.target.disabled = false; return;
    }
    const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href, captchaToken } });
    resetCaptcha();
    if (error) { showMsg("magicMsg", error.message, "error"); e.target.disabled = false; return; }
    showMsg("magicMsg", `Magic link sent to ${email}. Check your inbox.`, "success");
    e.target.disabled = false;
  });

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    if (el) el.innerHTML = `<div class="msg ${type}">${text}</div>`;
  }
</script>
</body>
</html>
