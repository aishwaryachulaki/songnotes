<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="file:///Users/directory/Desktop/songnotes/fonts/fonts.css" />
<style>
  :root{--butter:#F4D9A6;--ink:#3A2E2A;--ink-mid:#6B5A52;--rose:#D96B7C;--logo:#C04E6A;--tangerine:#F08C21;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:440px;height:280px;overflow:hidden;}
  .tile{position:relative;width:440px;height:280px;overflow:hidden;
    background:var(--butter) url('file:///Users/directory/Desktop/songnotes/background.png') center / cover no-repeat;
    font-family:'Lora',Georgia,serif;color:var(--ink);
    padding:34px 36px;display:flex;flex-direction:column;justify-content:center;}
  .floral{position:absolute;right:-26px;bottom:-30px;width:215px;opacity:0.26;pointer-events:none;}
  .top{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;position:relative;z-index:2;}
  .logo{font-family:'Spectral',serif;font-style:italic;font-weight:400;font-size:27px;color:var(--logo);letter-spacing:-.01em;}
  .logo .spark{font-style:normal;font-family:sans-serif;font-size:12px;color:var(--tangerine);vertical-align:super;line-height:0;margin-left:2px;}
  .tag{font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.2em;font-size:9px;color:var(--ink-mid);text-transform:uppercase;opacity:.6;}
  .headline{position:relative;z-index:2;font-family:'Spectral',Georgia,serif;font-style:italic;font-weight:400;
    font-size:33px;line-height:1.12;letter-spacing:-.01em;max-width:300px;}
  .headline .hl{color:var(--rose);}
</style>
</head>
<body>
  <div class="tile">
    <img class="floral" src="file:///Users/directory/Desktop/songnotes/flower.png" alt="" />
    <div class="top">
      <span class="logo">keepsake.<span class="spark">✦</span></span>
      <span class="tag">Notes for Spotify</span>
    </div>
    <div class="headline">Leave a note <span class="hl">inside the music.</span></div>
  </div>
</body>
</html>
