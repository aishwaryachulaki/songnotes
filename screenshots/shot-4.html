<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../fonts/fonts.css" />
<style>
  :root{--butter:#F4D9A6;--cream:#F7E9D3;--ink:#3A2E2A;--ink-mid:#6B5A52;--rose:#D96B7C;--logo:#C04E6A;--tangerine:#F08C21;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1280px;height:800px;overflow:hidden;}
  .slide{width:1280px;height:800px;position:relative;
    background:var(--butter) url('../background.png') center / cover no-repeat;
    font-family:'Lora',Georgia,serif;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .bot{position:absolute;height:540px;width:auto;opacity:.12;z-index:1;filter:saturate(.7);}
  .bot.r{right:-30px;top:-50px;transform:rotate(188deg);}
  .col{position:relative;z-index:3;max-width:900px;padding:0 60px;}
  .brand{display:flex;align-items:baseline;gap:13px;justify-content:center;margin-bottom:30px;}
  .brand .logo{font-family:'Spectral',serif;font-style:italic;font-weight:400;font-size:28px;color:var(--logo);}
  .brand .logo .spark{font-style:normal;font-family:sans-serif;font-size:12px;color:var(--tangerine);vertical-align:super;line-height:0;margin-left:2px;}
  .seal{width:104px;height:104px;border-radius:50%;margin:0 auto 28px;
    display:flex;align-items:center;justify-content:center;
    border:2px dashed rgba(192,78,106,0.38);background:rgba(247,233,211,0.55);
    box-shadow:0 10px 26px -12px rgba(58,36,24,0.4);}
  .seal svg{width:44px;height:44px;stroke:var(--logo);}
  .eyebrow{font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.26em;
    font-size:15px;color:var(--rose);text-transform:uppercase;margin-bottom:22px;}
  h1{font-family:'Spectral',Georgia,serif;font-style:italic;font-weight:400;
    font-size:78px;line-height:1.05;letter-spacing:-.01em;margin-bottom:28px;}
  h1 .hl{color:var(--rose);}
  .sub{font-size:24px;line-height:1.6;color:var(--ink-mid);max-width:720px;margin:0 auto;}
  .sub .s{color:var(--rose);}
</style>
</head>
<body>
  <div class="slide">
    <img class="bot r" src="../rose2.png" alt="" />
    <div class="col">
      <div class="brand"><span class="logo">keepsake.<span class="spark">✦</span></span></div>
      <div class="seal">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="eyebrow">Private by design</div>
      <h1>Your words <span class="hl">stay yours.</span></h1>
      <div class="sub">Every note is end-to-end encrypted inside your browser before it ever leaves <span class="s">✦</span> the key travels in the link itself, so not even we can read them.</div>
    </div>
  </div>
</body>
</html>
