<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../fonts/fonts.css" />
    <link rel="stylesheet" href="../popup.css" />
    <style>
      html, body { margin: 0; }
      .wrap { padding: 16px 18px 24px; }
      * { caret-color: transparent !important; }
      /* mock album thumb (the real one is an <img>) */
      .mock-thumb { width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0;
        background: linear-gradient(135deg,#2e7d6b,#1f5a4d); }
    </style>
  </head>
  <body>
    <div class="wrap">

      <div id="authBar" class="auth-bar">
        <div class="auth-top">
          <span class="auth-email">sam@example.com</span>
          <div class="auth-links">
            <a class="auth-link">Account</a>
            <a class="auth-link">Sign out</a>
          </div>
        </div>
        <span class="credits-badge">3 keepsakes</span>
      </div>

      <div class="stamp-track">
        <div class="stamp-eyebrow">✧ NOW PLAYING</div>
        <div class="track-title">Linger</div>
        <div class="track-artist">The Cranberries</div>
        <div class="postmark" aria-hidden="true">
          <div class="postmark-inner">
            <div class="postmark-top">KEEPSAKE</div>
            <svg class="postmark-wave" viewBox="0 0 44 10" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 5 C3.5 1 7 9 11 5 C15 1 18.5 9 22 5 C25.5 1 29 9 33 5 C37 1 40.5 9 44 5"
                    stroke="rgba(58,36,24,0.35)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
              <path d="M0 8 C3.5 4 7 12 11 8 C15 4 18.5 12 22 8 C25.5 4 29 12 33 8 C37 4 40.5 12 44 8"
                    stroke="rgba(58,36,24,0.22)" stroke-width="0.9" stroke-linecap="round" fill="none"/>
            </svg>
            <div class="postmark-year">2026</div>
          </div>
        </div>
      </div>

      <div class="section-header"><span>NOTES FOR THIS SONG</span></div>
      <div class="notes">
        <div class="note">
          <div class="meta">0:48</div>
          <div class="note-text">First time I heard this I was 17. You'd have loved the bridge.</div>
          <div class="note-actions">
            <button class="del" title="Delete">×</button>
            <button class="note-edit" title="Edit">✎</button>
          </div>
        </div>
      </div>

      <!-- Share panel (current) -->
      <div class="share-panel" id="sharePanel">
        <div class="sp-header">
          <div class="sp-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            SHARE WITH <span class="sp-recipient">Maya</span>
          </div>
          <div class="sp-pill sp-pill--ready">● Ready to share</div>
        </div>

        <div class="sp-desc-block">
          <label class="sp-input-label">Description <span class="sp-required">(optional)</span></label>
          <textarea class="sp-desc-input" rows="2" readonly>for the drive home, and every one after it.</textarea>
        </div>

        <div class="sp-card">
          <div class="sp-thumb mock-thumb"></div>
          <div class="sp-card-info">
            <div class="sp-card-title">Linger</div>
            <div class="sp-card-sub">The Cranberries</div>
          </div>
          <div class="sp-spotify-badge">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            Spotify
          </div>
        </div>

        <div class="sp-footer">
          <button class="sp-share-btn">SHARE</button>
        </div>
        <div class="sp-divider" aria-hidden="true"><span class="sp-divider-sparkle">✦</span></div>
        <div class="sp-actions">
          <button class="discard-btn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Discard draft
          </button>
          <button class="new-share-btn">+ New Share</button>
        </div>
      </div>

    </div>
  </body>
</html>
