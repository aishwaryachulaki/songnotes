<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../fonts/fonts.css" />
<style>
  :root{--butter:#F4D9A6;--cream:#F7E9D3;--ink:#3A2E2A;--ink-mid:#6B5A52;--rose:#D96B7C;--logo:#C04E6A;--tangerine:#F08C21;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1280px;height:800px;overflow:hidden;}
  .slide{width:1280px;height:800px;position:relative;
    background:var(--butter) url('../background.png') center / cover no-repeat;
    font-family:'Lora',Georgia,serif;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .brand{display:flex;align-items:baseline;gap:13px;justify-content:center;margin-bottom:24px;position:relative;z-index:2;}
  .brand .logo{font-family:'Spectral',serif;font-style:italic;font-weight:400;font-size:28px;color:var(--logo);}
  .brand .logo .spark{font-style:normal;font-family:sans-serif;font-size:12px;color:var(--tangerine);vertical-align:super;line-height:0;margin-left:2px;}
  h1{font-family:'Spectral',Georgia,serif;font-style:italic;font-weight:400;
    font-size:66px;line-height:1.05;letter-spacing:-.01em;margin-bottom:14px;position:relative;z-index:2;}
  h1 .hl{color:var(--rose);}
  .sub{font-size:21px;line-height:1.5;color:var(--ink-mid);max-width:720px;margin:0 auto 56px;position:relative;z-index:2;}
  .steps{display:flex;gap:56px;align-items:flex-start;position:relative;z-index:2;}
  .step{display:flex;flex-direction:column;align-items:center;width:240px;}
  .stampcard{position:relative;width:240px;height:120px;}
  .stampcard img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 14px 18px rgba(58,36,24,0.28));}
  .stampcard .flower{position:absolute;top:18%;right:9%;width:19%;height:auto;z-index:2;pointer-events:none;}
  .step:nth-child(1) .stampcard{transform:rotate(-5deg);}
  .step:nth-child(2) .stampcard{transform:translateY(-12px) rotate(1deg);}
  .step:nth-child(3) .stampcard{transform:rotate(5deg);}
  .pink .flower{filter:invert(0.45) sepia(1) hue-rotate(308deg) saturate(1.2) brightness(1.0);}
  .yellow .flower{filter:invert(0.45) sepia(1) saturate(1.3) brightness(1.0);}
  .olive .flower{filter:invert(0.45) sepia(1) hue-rotate(32deg) saturate(0.9) brightness(0.85);}
  .steplabel{font-family:'Spectral',serif;font-style:italic;font-size:30px;margin-top:26px;color:var(--logo);}
  .step:nth-child(2) .steplabel{margin-top:14px;}
  .stepdesc{font-size:17px;color:var(--ink-mid);margin-top:4px;line-height:1.4;}
  .browsers{margin-top:48px;font-family:'Montserrat',sans-serif;font-weight:600;
    font-size:15px;letter-spacing:.03em;color:var(--ink-mid);position:relative;z-index:2;}
</style>
</head>
<body>
  <div class="slide">
    <div class="brand"><span class="logo">keepsake.<span class="spark">✦</span></span></div>
    <h1>Lives in your browser, <span class="hl">beside Spotify.</span></h1>
    <div class="sub">A quiet companion on the Spotify web player.</div>
    <div class="steps">
      <div class="step pink">
        <div class="stampcard"><img class="bg" src="../stamp-pink.png" alt="" /><img class="flower" src="../rose2.png" alt="" /></div>
        <div class="steplabel">Write</div>
        <div class="stepdesc">Mark a moment in a song</div>
      </div>
      <div class="step yellow">
        <div class="stampcard"><img class="bg" src="../stamp-yellow.png" alt="" /><img class="flower" src="../sunflower.png" alt="" /></div>
        <div class="steplabel">Send</div>
        <div class="stepdesc">Share it as one link</div>
      </div>
      <div class="step olive">
        <div class="stampcard"><img class="bg" src="../stamp-olive.png" alt="" /><img class="flower" src="../marigold.png" alt="" /></div>
        <div class="steplabel">Replay</div>
        <div class="stepdesc">They listen, notes appear</div>
      </div>
    </div>
    <div class="browsers">Works in Chrome · Brave · Edge · Opera · Arc &amp; other Chromium browsers</div>
  </div>
</body>
</html>
