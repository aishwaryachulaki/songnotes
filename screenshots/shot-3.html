<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../fonts/fonts.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&display=swap" />
<link rel="stylesheet" href="../content.css" />
<style>
  :root{--butter:#F4D9A6;--cream:#F7E9D3;--ink:#3A2E2A;--ink-mid:#6B5A52;--rose:#D96B7C;--logo:#C04E6A;--tangerine:#F08C21;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1280px;height:800px;overflow:hidden;}
  .slide{width:1280px;height:800px;position:relative;
    background:var(--butter) url('../background.png') center / cover no-repeat;
    font-family:'Lora',Georgia,serif;color:var(--ink);display:flex;align-items:center;
    padding:0 80px;gap:30px;}
  .left{width:500px;position:relative;z-index:2;}
  .brand{display:flex;align-items:baseline;gap:13px;margin-bottom:28px;}
  .brand .logo{font-family:'Spectral',serif;font-style:italic;font-weight:400;font-size:30px;color:var(--logo);}
  .brand .logo .spark{font-style:normal;font-family:sans-serif;font-size:13px;color:var(--tangerine);vertical-align:super;line-height:0;margin-left:2px;}
  .brand .tag{font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.2em;font-size:12px;color:var(--ink-mid);text-transform:uppercase;opacity:.65;}
  h1{font-family:'Spectral',Georgia,serif;font-style:italic;font-weight:400;
    font-size:72px;line-height:1.04;letter-spacing:-.01em;margin-bottom:26px;}
  h1 .hl{color:var(--rose);}
  .sub{font-size:23px;line-height:1.55;color:var(--ink-mid);max-width:470px;}
  .sub .s{color:var(--rose);}
  .right{flex:1;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;height:100%;}

  /* hero illustration in a rounded frame (same image as index.html) */
  .hero-frame{width:540px;border-radius:22px;overflow:hidden;
    box-shadow:0 30px 70px -18px rgba(58,36,24,0.45),0 0 0 1px rgba(58,36,24,0.06);
    transform:rotate(-2deg);}
  .hero-frame img{width:100%;display:block;}

  /* the real Keepsake note, sitting on top of the scene */
  .note-pop{position:absolute;top:96px;right:-28px;z-index:5;
    transform:rotate(3deg) scale(0.92);transform-origin:top right;
    filter:drop-shadow(0 18px 44px rgba(100,55,35,0.42)) drop-shadow(0 4px 10px rgba(100,55,35,0.2));}
  .note-pop .ks-card{background-image:url('../floater.png');cursor:default;}
</style>
</head>
<body>
  <div class="slide">
    <div class="left">
      <div class="brand"><span class="logo">keepsake.<span class="spark">✦</span></span><span class="tag">Notes for Spotify</span></div>
      <h1>They hear you, <span class="hl">right on cue.</span></h1>
      <div class="sub">As the song reaches each moment you marked, your note appears, exactly on time <span class="s">✦</span> like a voice leaning in beside the music.</div>
    </div>
    <div class="right">
      <div class="hero-frame"><img src="../hero.png" alt="" /></div>
      <div class="note-pop">
        <div class="ks-card">
          <button class="ks-close" aria-hidden="true">&#x00D7;</button>
          <div class="ks-label">✦&nbsp;&nbsp;sam sent you a note</div>
          <div class="ks-text sn-medium">First time I heard this I was 17. You'd have loved the bridge.</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
