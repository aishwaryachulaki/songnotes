<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://checkout.razorpay.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://*.razorpay.com https://lumberjack.razorpay.com https://open.spotify.com; frame-src https://checkout.razorpay.com https://*.razorpay.com https://challenges.cloudflare.com; base-uri 'self'; form-action 'self' https://*.razorpay.com;" />
  <script>/* anti-clickjacking: never allow this page to be framed */if (self!==top){try{top.location=self.location.href;}catch(e){document.documentElement.style.visibility='hidden';}}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Received Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@500;600;700&display=swap" />
  <style>
    :root {
      --rose:      #D96B7C;
      --tangerine: #F08C21;
      --cream:     #FFFBF4;
      --bg:        #F4D9A6;
      --ink:       #3A2E2A;
      --ink-mid:   #6B5A52;
      --ink-lt:    #A08878;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg) url('background.png') center / cover no-repeat fixed;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      color: var(--ink);
      padding: 0 16px 80px;
      overscroll-behavior: none;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Nav ── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 0 10px;
    }
    .nav-logo {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400; font-size: 26px;
      color: var(--rose); text-decoration: none; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 5px;
      text-shadow: 0 1px 12px rgba(140,50,60,0.13);
    }
    .nav-logo .logo-spark {
      font-style: normal; font-family: sans-serif;
      font-size: 11px; color: var(--tangerine); font-weight: 400;
      vertical-align: super; line-height: 0;
    }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-mid);
      text-decoration: none; opacity: 0.65; transition: opacity 0.15s;
    }
    .nav-link:hover { opacity: 1; }
    .nav-link.active { opacity: 1; color: var(--rose); }
    .btn-signout {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 20px;
      background: rgba(217,107,124,0.10);
      border: 1.5px solid rgba(217,107,124,0.30);
      color: var(--rose); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-signout:hover { background: rgba(217,107,124,0.18); }

    /* ── Section header ── */
    .section-header { display: flex; align-items: center; gap: 10px; }
    .section-header span {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.5px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--rose); white-space: nowrap;
      opacity: 0.75;
    }
    .section-header::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(217,107,124,0.22);
    }

    /* ── Share cards ── */
    .shares-list { display: flex; flex-direction: column; gap: 10px; }

    .share-card {
      border-radius: 14px; padding: 22px 24px;
      position: relative; overflow: hidden;
      transition: filter 0.15s;
    }
    .share-card:hover { filter: brightness(0.97); }
    .share-card:nth-child(3n+1) { background: url('faq-bg-pink.png') top / cover no-repeat; color: #5c2d2d; }
    .share-card:nth-child(3n+2) { background: url('faq-bg-yellow.png') top / cover no-repeat; color: #4a3800; }
    .share-card:nth-child(3n+3) { background: url('faq-bg-olive.png')  center / cover no-repeat; color: #363614; }

    .share-card::after {
      content: '✦';
      position: absolute; right: 20px; top: 16px;
      font-size: 22px; opacity: 0.10; pointer-events: none;
    }

    .share-from {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 7px;
    }
    .share-track {
      font-family: 'Lora', Georgia, serif;
      font-size: 18px; font-weight: 700; line-height: 1.2; margin-bottom: 3px;
    }
    .share-artist {
      font-size: 12.5px; opacity: 0.60; margin-bottom: 12px;
    }
    .share-notes-count {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 13px; opacity: 0.65;
    }
    .share-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; flex-wrap: wrap; gap: 8px;
    }
    .share-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 9.5px; letter-spacing: 0.04em; opacity: 0.50;
    }
    .share-type-pill {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 8px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 2px 8px; border-radius: 10px;
      background: rgba(217,107,124,0.12); color: var(--rose);
      margin-bottom: 10px;
    }

    /* ── Notice card (for setup needed state) ── */
    .notice-card {
      background: url('faq-bg-pink.png') top / cover no-repeat;
      border-radius: 14px; padding: 28px 28px 26px;
      color: #5c2d2d; position: relative; overflow: hidden;
    }
    .notice-card::after {
      content: '✦'; position: absolute; right: 24px; top: 20px;
      font-size: 28px; opacity: 0.10; pointer-events: none;
    }
    .notice-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 10px;
    }
    .notice-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 19px; font-weight: 700; margin-bottom: 10px;
    }
    .notice-body { font-size: 13.5px; line-height: 1.65; opacity: 0.75; margin-bottom: 14px; }
    .notice-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 13px; color: var(--rose); opacity: 0.85;
    }

    /* ── Empty state ── */
    .empty-state {
      background: url('faq-bg-yellow.png') top / cover no-repeat;
      border-radius: 14px; padding: 52px 32px; text-align: center;
      color: #4a3800;
    }
    .empty-icon { font-size: 30px; opacity: 0.30; margin-bottom: 16px; }
    .empty-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 20px; font-weight: 700; margin-bottom: 8px;
    }
    .empty-sub {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-size: 14px; color: var(--rose); opacity: 0.85;
    }

    /* ── State ── */
    @keyframes ks-breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    .state {
      text-align: center; padding: 80px 20px;
      color: var(--ink-mid); font-size: 14px; line-height: 1.6;
    }
    .state strong {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic; font-weight: 400;
      display: block; font-size: 32px; color: var(--rose);
      margin-bottom: 8px;
      animation: ks-breathe 2s ease-in-out infinite;
    }

    /* ── Footer ── */
    .footer-links {
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; color: var(--ink-lt); letter-spacing: 0.04em;
      opacity: 0.7;
    }
    .footer-links a { color: var(--ink-lt); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="page" id="page">
  <div class="state"><strong>loading…</strong></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1/dist/umd/supabase.js" integrity="sha384-EjUdIVmzWliPzdzhxZ9ZoO0etXLKWuUPUftAGxP6qH6Lm4oLwoLaJR0Ba4pIDiDL" crossorigin="anonymous"></script>
<script>
  const SUPABASE_URL = "https://kkasgbkgwjxiutdalbbm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYXNnYmtnd2p4aXV0ZGFsYmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjU3OTQsImV4cCI6MjA5Mjg0MTc5NH0.z1JLMTzz3X_swbWHdt2z4UDKyUwjEfNYys5kdDMq3R4";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }

  let currentUser = null;

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = "auth.html"; return; }
    currentUser = session.user;
    await loadReceived();
  })();

  const NAV = () => `
    <div class="nav">
      <a class="nav-logo" href="index.html">keepsake.<span class="logo-spark">✦</span></a>
      <div class="nav-right">
        <a class="nav-link" href="sent.html">Sent</a>
        <a class="nav-link active" href="received.html">Received</a>
        <a class="nav-link" href="account.html">Account</a>
        <button class="btn-signout" id="signoutBtn">Sign out</button>
      </div>
    </div>
  `;

  const FOOTER = `
    <div class="footer-links">
      <a href="privacy.html" target="_blank">Privacy Policy</a>
      &nbsp;·&nbsp;
      <a href="index.html">Home</a>
    </div>
  `;

  async function loadReceived() {
    // Check if received_shares table exists
    const { data, error } = await sb
      .from("received_shares")
      .select(`
        id, imported_at,
        shares (
          id, share_type, sender_name, recipient_name, created_at,
          playlist_name, playlist_url, playlist_id,
          annotations ( id, track_id, track_title, track_artist, note )
        )
      `)
      .order("imported_at", { ascending: false });

    if (error && error.code === "42P01") {
      // Table doesn't exist yet — show setup card
      renderSetupNeeded();
      return;
    }

    if (error) {
      renderError(error.message);
      return;
    }

    renderReceived(data || []);
  }

  function renderSetupNeeded() {
    document.getElementById("page").innerHTML = `
      ${NAV()}
      <div class="section-header"><span>Notes sent to you</span></div>
      <div class="notice-card">
        <div class="notice-eyebrow">Coming soon</div>
        <div class="notice-title">Your received notes will live here</div>
        <div class="notice-body">
          When someone sends you a Keepsake link and you import it in the extension,
          it'll be saved here so you can always come back to it, even after the link expires.
        </div>
        <div class="notice-sub">Sync from extension needs one quick setup step.</div>
      </div>
      <div class="notice-card" style="background: url('faq-bg-olive.png') center/cover no-repeat; color: #363614; margin-top: 0;">
        <div class="notice-eyebrow" style="margin-bottom: 10px;">How it'll work</div>
        <div style="font-size: 13.5px; line-height: 1.75; opacity: 0.72;">
          1. Someone sends you a Keepsake link<br>
          2. You open it in the extension while signed in<br>
          3. It saves here automatically, all your received notes in one place, forever
        </div>
      </div>
      ${FOOTER}
    `;
    attachSignout();
  }

  function renderError(msg) {
    document.getElementById("page").innerHTML = `
      ${NAV()}
      <div class="notice-card">
        <div class="notice-title">Something went wrong</div>
        <div class="notice-body">${escHtml(msg)}</div>
      </div>
      ${FOOTER}
    `;
    attachSignout();
  }

  function renderReceived(items) {
    let content;
    if (items.length === 0) {
      content = `
        <div class="empty-state">
          <div class="empty-icon">♪</div>
          <div class="empty-title">Nothing received yet</div>
          <div class="empty-sub">Notes people send you will appear here once you import them in the extension.</div>
        </div>
      `;
    } else {
      const cards = items.map((item, i) => {
        const share = item.shares;
        if (!share) return "";
        const anns = share.annotations || [];
        const noteCount = anns.length;
        const uniqueTracks = new Set(anns.map(a => a.track_id || a.track_title).filter(Boolean)).size || anns.length;
        const isPlaylist = share.share_type === "playlist"
          || !!(share.playlist_url || share.playlist_id)
          || !!share.playlist_name
          || uniqueTracks > 1;

        const trackTitle = isPlaylist
          ? (share.playlist_name ? escHtml(share.playlist_name) : "A Playlist Share")
          : (anns[0]?.track_title ? escHtml(anns[0].track_title) : "Untitled note");
        const trackArtist = isPlaylist ? "" : (anns[0]?.track_artist || "");

        const typePill = isPlaylist
          ? `<div class="share-type-pill">Playlist · ${uniqueTracks} song${uniqueTracks !== 1 ? "s" : ""}</div>`
          : "";

        const noteLabel = noteCount === 1 ? "1 note inside" : `${noteCount} notes inside`;

        const importDate = new Date(item.imported_at).toLocaleDateString("en-IN", {
          day: "numeric", month: "short", year: "numeric"
        });

        return `
          <div class="share-card">
            <div class="share-from">From ${share.sender_name ? escHtml(share.sender_name) : "someone"}</div>
            ${typePill}
            <div class="share-track">${trackTitle}</div>
            ${trackArtist ? `<div class="share-artist">${escHtml(trackArtist)}</div>` : ""}
            ${noteCount > 0 ? `<div class="share-notes-count">${noteLabel}</div>` : ""}
            <div class="share-footer">
              <div class="share-date">Received ${importDate}</div>
            </div>
          </div>
        `;
      }).join("");
      content = `<div class="shares-list">${cards}</div>`;
    }

    document.getElementById("page").innerHTML = `
      ${NAV()}
      <div class="section-header"><span>Notes sent to you</span></div>
      ${content}
      ${FOOTER}
    `;
    attachSignout();
  }

  function attachSignout() {
    const btn = document.getElementById("signoutBtn");
    if (btn) {
      btn.addEventListener("click", async () => {
        await sb.auth.signOut();
        await new Promise(resolve => {
          window.addEventListener("keepsake:signout_done", resolve, { once: true });
          window.dispatchEvent(new CustomEvent("keepsake:signout"));
          setTimeout(resolve, 800);
        });
        window.location.href = "index.html";
      });
    }
  }
</script>
</body>
</html>
